<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Vroom! – Lär dig koreanska</title>
<style>
  :root {
    --ink: #2b2140;
    --card: #ffffff;
    --shadow: rgba(43, 33, 64, 0.18);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: "Baloo 2", "Comic Sans MS", "Segoe UI", system-ui, sans-serif;
    color: var(--ink);
    overflow: hidden;
    user-select: none; -webkit-user-select: none;
  }
  body {
    background: linear-gradient(160deg, #ffe27a, #ff9e7a);
    display: flex; flex-direction: column;
    height: 100dvh;
    transition: background .4s ease;
  }

  /* ---------- Top bar ---------- */
  header {
    flex: 0 0 auto;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    gap: 10px;
    padding: max(10px, env(safe-area-inset-top)) 12px 8px;
    min-height: 56px;
  }
  .back {
    position: absolute; left: 12px; top: max(8px, env(safe-area-inset-top));
    border: none; cursor: pointer; font-family: inherit;
    font-size: clamp(26px, 7vw, 32px);
    background: rgba(255,255,255,0.8); color: var(--ink);
    width: clamp(52px, 14vw, 60px); height: clamp(52px, 14vw, 60px);
    display: none; align-items: center; justify-content: center;
    border-radius: 50%;
    box-shadow: 0 3px 10px var(--shadow);
  }
  .back:active { transform: scale(0.9); }
  .title {
    font-weight: 900; font-size: clamp(20px, 5.5vw, 30px);
    display: none; align-items: center; gap: 8px;
  }
  .tabs {
    display: none; gap: 8px;
    background: rgba(255,255,255,0.5);
    padding: 6px; border-radius: 999px;
    box-shadow: 0 4px 14px var(--shadow);
  }
  .tab {
    border: none; cursor: pointer;
    font-family: inherit; font-weight: 800;
    color: var(--ink); background: transparent;
    padding: 8px 20px; border-radius: 999px;
    display: flex; flex-direction: column; align-items: center; line-height: 1;
    transition: transform .12s ease, background .18s ease;
  }
  .tab .tab-icon { font-size: clamp(26px, 7vw, 34px); }
  .tab .tab-label { font-size: clamp(11px, 3vw, 14px); margin-top: 3px; letter-spacing: 0.02em; }
  .tab.active { background: var(--card); box-shadow: 0 3px 10px var(--shadow); }
  .tab:active { transform: scale(0.94); }

  /* When inside a category, show back + title + tabs */
  body.in-category .back { display: flex; }
  body.in-category .tabs { display: flex; }
  /* Test has no Utforska/Spela split — just back + title */
  body.in-test .back { display: flex; }

  /* ---------- Screens ---------- */
  main { flex: 1 1 auto; position: relative; overflow: hidden; }
  .screen {
    position: absolute; inset: 0;
    display: none;
    padding: 12px 12px calc(16px + env(safe-area-inset-bottom));
    overflow-y: auto; -webkit-overflow-scrolling: touch;
  }
  .screen.active { display: block; }

  /* ---------- Home (category picker) ---------- */
  .home-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 18px;
    max-width: 820px; margin: 0 auto;
  }
  .cat-card {
    border: none; cursor: pointer; font-family: inherit;
    background: var(--card);
    border-radius: 30px;
    padding: 22px 12px 18px;
    text-align: center;
    box-shadow: 0 8px 20px var(--shadow);
    transition: transform .1s ease;
    color: var(--ink);
  }
  .cat-card:active { transform: scale(0.94); }
  .cat-emoji { font-size: clamp(52px, 16vw, 82px); line-height: 1; display: block; }
  .cat-name { font-size: clamp(18px, 5vw, 26px); font-weight: 900; margin-top: 8px; }
  .cat-ko { font-size: clamp(13px, 3.6vw, 16px); color: #8a7fa6; font-weight: 700; margin-top: 2px; }

  /* ---------- Explore grid ---------- */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 16px;
    max-width: 900px; margin: 0 auto;
  }
  .card {
    background: var(--card);
    border-radius: 26px;
    padding: 14px 10px 10px;
    text-align: center;
    box-shadow: 0 8px 18px var(--shadow);
    cursor: pointer; position: relative;
    transition: transform .1s ease;
  }
  .card:active { transform: scale(0.93); }
  .card.pop { animation: pop .45s ease; }
  @keyframes pop { 0%{transform:scale(1);} 40%{transform:scale(1.12) rotate(-3deg);} 100%{transform:scale(1);} }
  .emoji { font-size: clamp(48px, 15vw, 78px); line-height: 1; display: block; }
  .swatch {
    width: clamp(56px, 17vw, 84px); height: clamp(56px, 17vw, 84px);
    border-radius: 20px; margin: 4px auto 0;
    box-shadow: inset 0 0 0 3px rgba(0,0,0,0.08);
  }
  .ko { font-size: clamp(20px, 5.5vw, 28px); font-weight: 800; margin-top: 6px; }
  .rom { font-size: clamp(12px, 3.4vw, 15px); color: #8a7fa6; font-weight: 700; }
  .se-btn {
    margin-top: 8px;
    border: none; cursor: pointer; font-family: inherit;
    font-size: clamp(13px, 3.6vw, 16px); font-weight: 800;
    background: #eef0ff; color: #4a4a8a;
    padding: 7px 12px; border-radius: 999px;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .se-btn:active { transform: scale(0.9); }

  /* ---------- Game ---------- */
  #game { flex-direction: column; height: 100%; }
  #game.active { display: flex; }

  /* Spelväljare (Lyssna / Memory / Sant-Falskt) */
  .game-modes {
    flex: 0 0 auto; display: flex; justify-content: center; gap: 8px;
    margin: 4px auto 8px;
    background: rgba(255,255,255,0.5);
    padding: 6px; border-radius: 999px;
    box-shadow: 0 4px 14px var(--shadow);
  }
  .game-mode-btn {
    border: none; cursor: pointer; font-family: inherit; font-weight: 800;
    color: var(--ink); background: transparent;
    padding: 8px 16px; border-radius: 999px;
    display: flex; align-items: center; gap: 6px;
    font-size: clamp(13px, 3.6vw, 16px);
    transition: transform .12s ease, background .18s ease;
  }
  .game-mode-btn.active { background: var(--card); box-shadow: 0 3px 10px var(--shadow); }
  .game-mode-btn:active { transform: scale(0.94); }

  /* Underskärm per spelläge */
  .game-sub { display: none; flex-direction: column; align-items: center; flex: 1 1 auto; min-height: 0; width: 100%; }
  .game-sub.active { display: flex; }

  .prompt { flex: 0 0 auto; text-align: center; max-width: 700px; margin: 6px auto 4px; width: 100%; }
  .prompt p { margin: 0 0 10px; font-size: clamp(18px, 5vw, 26px); font-weight: 800; }
  .listen {
    border: none; cursor: pointer; font-family: inherit;
    font-size: clamp(30px, 9vw, 46px);
    background: var(--card); color: var(--ink);
    width: clamp(90px, 26vw, 130px); height: clamp(90px, 26vw, 130px);
    border-radius: 50%; box-shadow: 0 8px 20px var(--shadow);
  }
  .listen:active { transform: scale(0.92); }
  /* Idle "press me" heartbeat so a non-reader knows to tap it */
  .listen { animation: pressme 1.6s ease-in-out infinite; }
  .listen.speaking { animation: wiggle .6s ease infinite; }
  @keyframes wiggle { 0%,100%{transform:rotate(0);} 25%{transform:rotate(-8deg);} 75%{transform:rotate(8deg);} }
  @keyframes pressme {
    0%,100%{ transform:scale(1); box-shadow:0 8px 20px var(--shadow); }
    50%{ transform:scale(1.08); box-shadow:0 8px 26px var(--shadow), 0 0 0 10px rgba(255,255,255,0.35); }
  }
  .choices {
    flex: 1 1 auto;
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px;
    align-content: center;
    max-width: 640px; margin: 10px auto 0; width: 100%; padding-bottom: 10px;
  }
  .choice {
    background: var(--card); border: none; cursor: pointer;
    border-radius: 34px; aspect-ratio: 1 / 1;
    font-size: clamp(64px, 30vw, 150px);
    box-shadow: 0 10px 22px var(--shadow);
    display: flex; align-items: center; justify-content: center;
    transition: transform .1s ease; overflow: hidden;
  }
  /* Gently point at the right answer when the child needs help */
  .choice.hint { animation: hintBounce 1s ease infinite; box-shadow: 0 0 0 6px #ffe27a, 0 10px 22px var(--shadow); }
  @keyframes hintBounce { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-14px);} }
  .choice:active { transform: scale(0.93); }
  .choice.correct { animation: correct .6s ease; background: #c9f7d0; }
  .choice.wrong { animation: shake .4s ease; }
  .choice .swatch { width: 62%; height: 62%; margin: 0; }
  @keyframes correct { 0%{transform:scale(1);} 50%{transform:scale(1.18);} 100%{transform:scale(1);} }
  @keyframes shake { 0%,100%{transform:translateX(0);} 20%{transform:translateX(-9px);} 60%{transform:translateX(9px);} }

  /* ---------- Memory ---------- */
  .memory-grid {
    flex: 1 1 auto; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
    gap: 12px;
    max-width: 720px; width: 100%; margin: 4px auto 0; padding-bottom: 10px;
  }
  .memory-card {
    background: var(--card); border: none; cursor: pointer; font-family: inherit;
    border-radius: 20px; aspect-ratio: 1 / 1;
    font-size: clamp(28px, 8vw, 46px);
    box-shadow: 0 6px 14px var(--shadow);
    display: flex; align-items: center; justify-content: center; flex-direction: column;
    text-align: center; padding: 4px;
    transition: transform .12s ease;
  }
  .memory-card:active { transform: scale(0.94); }
  .memory-card.flipped { background: #eef0ff; }
  .memory-card.matched { animation: correct .6s ease; background: #c9f7d0; cursor: default; }
  .memory-card.wrong { animation: shake .4s ease; }
  .memory-card .emoji { font-size: clamp(28px, 8vw, 46px); }
  .memory-card .swatch { width: 60%; height: 60%; margin: 0; border-radius: 14px; }
  .memory-card .ko { font-size: clamp(14px, 4vw, 20px); }
  .memory-card .rom { font-size: clamp(9px, 2.6vw, 12px); }

  /* ---------- Sant eller falskt ---------- */
  .tf-picture { flex: 0 0 auto; margin: 10px auto; display: flex; align-items: center; justify-content: center; }
  .tf-picture .emoji { font-size: clamp(80px, 30vw, 160px); }
  .tf-picture .swatch { width: clamp(100px, 30vw, 160px); height: clamp(100px, 30vw, 160px); margin: 0; }
  .tf-buttons {
    flex: 1 1 auto; display: flex; gap: 18px; align-items: center; justify-content: center;
    max-width: 520px; width: 100%; margin: 10px auto 0; padding-bottom: 10px;
  }
  .tf-btn {
    flex: 1 1 0; border: none; cursor: pointer; font-family: inherit; font-weight: 800;
    background: var(--card); color: var(--ink);
    border-radius: 34px; aspect-ratio: 1 / 1;
    box-shadow: 0 10px 22px var(--shadow);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
    font-size: clamp(40px, 14vw, 70px);
    transition: transform .1s ease;
  }
  .tf-btn span { font-size: clamp(13px, 4vw, 17px); }
  .tf-btn:active { transform: scale(0.93); }
  .tf-btn.correct { animation: correct .6s ease; background: #c9f7d0; }
  .tf-btn.wrong { animation: shake .4s ease; }

  /* ---------- Round counter + session-complete ---------- */
  .round-counter {
    flex: 0 0 auto; font-weight: 800; color: #8a7fa6;
    font-size: clamp(13px, 3.6vw, 16px); text-align: center; margin: 2px 0 0;
  }
  .round-done { display: none; flex: 1 1 auto; flex-direction: column; align-items: center; justify-content: center; gap: 18px; }
  .round-done-msg { font-size: clamp(26px, 7.5vw, 36px); font-weight: 900; text-align: center; }
  .replay-btn {
    border: none; cursor: pointer; font-family: inherit; font-weight: 800;
    font-size: clamp(16px, 4.5vw, 20px);
    background: var(--card); color: var(--ink);
    padding: 16px 30px; border-radius: 999px;
    box-shadow: 0 8px 20px var(--shadow);
  }
  .replay-btn:active { transform: scale(0.94); }
  .game-sub.done > *:not(.round-done) { display: none; }
  .game-sub.done .round-done { display: flex; }

  /* ---------- Test (blandat) ---------- */
  .test-wrap { display: flex; flex-direction: column; align-items: center; flex: 1 1 auto; min-height: 0; width: 100%; }
  .test-wrap.done > *:not(.round-done) { display: none; }
  .test-wrap.done .round-done { display: flex; }
  .count-scene {
    flex: 0 0 auto; display: flex; flex-wrap: wrap; justify-content: center; align-content: flex-start;
    gap: 4px; max-width: 480px; margin: 6px auto; min-height: 40px;
  }
  .count-scene .emoji { font-size: clamp(26px, 7vw, 40px); }
  .count-scene .swatch { width: clamp(26px, 7vw, 40px); height: clamp(26px, 7vw, 40px); margin: 0; }
  .choice.cat-choice { flex-direction: column; font-size: clamp(38px, 11vw, 60px); gap: 6px; }
  .cat-choice-label { font-size: clamp(13px, 3.6vw, 16px); font-weight: 800; }

  /* ---------- Celebration overlay ---------- */
  #cheer {
    position: absolute; inset: 0; pointer-events: none;
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(90px, 40vw, 240px); opacity: 0;
  }
  #cheer.show { animation: cheer 1s ease; }
  @keyframes cheer { 0%{opacity:0; transform:scale(0.3);} 30%{opacity:1; transform:scale(1.1);} 70%{opacity:1;} 100%{opacity:0; transform:scale(1);} }
  .confetti { position: absolute; top: -20px; font-size: 26px; pointer-events: none; }
  @keyframes fall { to { transform: translateY(110vh) rotate(540deg); opacity: 0.9; } }
</style>
</head>
<body>
  <header>
    <button class="back" id="backBtn" aria-label="Hem">🏠</button>
    <div class="title" id="catTitle"></div>
    <div class="tabs" id="tabs">
      <button class="tab active" data-screen="explore">
        <span class="tab-icon">🔎</span><span class="tab-label">Utforska</span>
      </button>
      <button class="tab" data-screen="game">
        <span class="tab-icon">🎮</span><span class="tab-label">Spela</span>
      </button>
    </div>
  </header>

  <main>
    <!-- Level 1: choose an area -->
    <section id="home" class="screen active">
      <div class="home-grid" id="homeGrid"></div>
    </section>

    <!-- Level 2: explore an area -->
    <section id="explore" class="screen">
      <div class="grid" id="grid"></div>
    </section>

    <!-- Level 2: game for an area -->
    <section id="game" class="screen">
      <div class="game-modes" id="gameModes">
        <button class="game-mode-btn active" data-mode="listen">🔊<span>Lyssna</span></button>
        <button class="game-mode-btn" data-mode="memory">🃏<span>Memory</span></button>
        <button class="game-mode-btn" data-mode="truefalse">✅<span>Sant/Falskt</span></button>
      </div>

      <div class="game-sub active" id="mode-listen">
        <div class="round-counter" id="listenCounter">Fråga 1 / 10</div>
        <div class="prompt">
          <p id="promptText">Tryck på det du hör 👂</p>
          <button class="listen" id="listenBtn" aria-label="Lyssna igen">🔊</button>
        </div>
        <div class="choices" id="choices"></div>
        <div class="round-done" id="listenDone">
          <div class="round-done-msg">🎉 Klart! 10/10</div>
          <button class="replay-btn" id="listenReplay">🔁 Spela igen</button>
        </div>
      </div>

      <div class="game-sub" id="mode-memory">
        <div class="memory-grid" id="memoryGrid"></div>
      </div>

      <div class="game-sub" id="mode-truefalse">
        <div class="round-counter" id="tfCounter">Fråga 1 / 10</div>
        <div class="tf-picture" id="tfPicture"></div>
        <button class="listen" id="tfListenBtn" aria-label="Lyssna igen">🔊</button>
        <div class="tf-buttons">
          <button class="tf-btn" id="tfYes">👍<span>Stämmer</span></button>
          <button class="tf-btn" id="tfNo">👎<span>Stämmer inte</span></button>
        </div>
        <div class="round-done" id="tfDone">
          <div class="round-done-msg">🎉 Klart! 10/10</div>
          <button class="replay-btn" id="tfReplay">🔁 Spela igen</button>
        </div>
      </div>
    </section>

    <!-- Level 2: Test — mixed quiz combining all categories -->
    <section id="test" class="screen">
      <div class="test-wrap" id="testWrap">
        <div class="round-counter" id="testCounter">Fråga 1 / 10</div>
        <div class="prompt" id="testPrompt">
          <p id="testPromptText">Lyssna och svara 🧠</p>
          <button class="listen" id="testListenBtn" aria-label="Lyssna igen">🔊</button>
        </div>
        <div class="count-scene" id="testScene"></div>
        <div class="choices" id="testChoices"></div>
        <div class="round-done" id="testDone">
          <div class="round-done-msg">🎉 Klart! 10/10</div>
          <button class="replay-btn" id="testReplay">🔁 Spela igen</button>
        </div>
      </div>
    </section>

    <div id="cheer"></div>
  </main>

<script>

   romanisation, Swedish. lang defaults to Korean.
   ========================================================= */

  {

    items:[

/* ===== Speech ===== */
let voices = [];
function loadVoices(){ voices = window.speechSynthesis ? speechSynthesis.getVoices() : []; }
if (window.speechSynthesis){ loadVoices(); speechSynthesis.onvoiceschanged = loadVoices; }
// Prefer a female-sounding voice when the OS offers a choice for that language.
const FEMALE_VOICE_NAMES = ["Flo","Shelley","Sandy","Grandma","Samantha","Kyoko","Yuna","Alva","Anna","Alice","Amelie","Milena"];
function pickVoice(lang){
  const base = lang.split('-')[0];
  const exact = voices.filter(v => v.lang && v.lang.toLowerCase() === lang.toLowerCase());
  const matches = exact.length ? exact : voices.filter(v => v.lang && v.lang.toLowerCase().startsWith(base));
  for (const name of FEMALE_VOICE_NAMES){
    const female = matches.find(v => v.name.startsWith(name));
    if (female) return female;
  }
  return matches[0] || null;
}
function speak(text, lang, onstart, onend){
  if (!window.speechSynthesis){ if(onend) onend(); return; }
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang;
  const v = pickVoice(lang); if (v) u.voice = v;
  u.rate = 0.8; u.pitch = 1.05;
  if (onstart) u.onstart = onstart;
  if (onend){ u.onend = onend; u.onerror = onend; }
  speechSynthesis.speak(u);
}
const sayKorean  = (t, on, off) => speak(t, "ko-KR", on, off);
const saySwedish = (t) => speak(t, "sv-SE");

/* ===== Sound effects ===== */
let audioCtx = null;
function getAudioCtx(){
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
// Synthesized applause (no audio files): a few filtered noise bursts.
function playClap(){
  const ctx = getAudioCtx();
  const now = ctx.currentTime;
  for (let i = 0; i < 5; i++){
    const start = now + i * 0.11 + Math.random() * 0.03;
    const dur = 0.09;
    const bufferSize = Math.floor(ctx.sampleRate * dur);
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let j = 0; j < bufferSize; j++) data[j] = (Math.random() * 2 - 1) * (1 - j / bufferSize);
    const noise = ctx.createBufferSource();
    noise.buffer = buffer;
    const filter = ctx.createBiquadFilter();
    filter.type = 'highpass';
    filter.frequency.value = 1200;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.9, start);
    gain.gain.exponentialRampToValueAtTime(0.01, start + dur);
    noise.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
    noise.start(start); noise.stop(start + dur);
  }
}

/* ===== Level 2b: Game ===== */
function shuffle(a){ a = a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

function clearHint(){
  clearTimeout(hintTimer);
  choicesEl.querySelectorAll('.choice.hint').forEach(c => c.classList.remove('hint'));
}
// After a stall, gently bounce the correct answer so the child never gets stuck.
function scheduleHint(){
  clearTimeout(hintTimer);
  hintTimer = setTimeout(() => {
    if (locked) return;
    const right = choicesEl.querySelector('.choice[data-correct="1"]');
    if (right) right.classList.add('hint');
  }, 4000);
}
function newRound(){
  if (!activeCat) return;
  locked = false;
  clearHint();
  listenRound++;
  listenCounterEl.textContent = `Fråga ${listenRound} / ${ROUNDS_PER_SESSION}`;
  const n = Math.min(2, activeCat.items.length);
  const options = shuffle(activeCat.items).slice(0, n);
  current = options[Math.floor(Math.random()*options.length)];
  choicesEl.innerHTML = '';
  options.forEach(item => {
    const b = document.createElement('button');
    b.className = 'choice';
    if (item === current) b.dataset.correct = '1';
    b.appendChild(pictureNode(item));
    b.addEventListener('click', () => onChoice(b, item));
    choicesEl.appendChild(b);
  });
  askAgain();
}
function askAgain(){
  if (!current) return;
  clearHint();
  listenBtn.classList.add('speaking');
  sayKorean(current.ko, null, () => listenBtn.classList.remove('speaking'));
  scheduleHint();
}
function onChoice(btn, item){
  if (locked) return;
  if (item === current){
    locked = true;
    clearHint();
    btn.classList.add('correct');
    celebrate();
    sayKorean(current.ko);
    if (listenRound >= ROUNDS_PER_SESSION) setTimeout(finishListenSession, 1200);
    else setTimeout(newRound, 1900);
  } else {
    // Never punish: little shake, then re-say the word — but don't reveal the answer.
    btn.classList.remove('wrong'); void btn.offsetWidth; btn.classList.add('wrong');
    sayKorean(current.ko, null, () => listenBtn.classList.remove('speaking'));
    listenBtn.classList.add('speaking');
  }
}
function finishListenSession(){
  modeListenEl.classList.add('done');
  celebrate();
  playClap();
}
listenReplayBtn.addEventListener('click', () => {
  modeListenEl.classList.remove('done');
  listenRound = 0;
  current = null;
  newRound();
});
function celebrate(){
  cheerEl.textContent = CHEERS[Math.floor(Math.random()*CHEERS.length)];
  cheerEl.classList.remove('show'); void cheerEl.offsetWidth; cheerEl.classList.add('show');
  for (let i=0;i<18;i++){
    const c = document.createElement('div');
    c.className = 'confetti';
    c.textContent = CHEERS[Math.floor(Math.random()*CHEERS.length)];
    c.style.left = Math.random()*100 + 'vw';
    c.style.animation = `fall ${1+Math.random()}s ease-in forwards`;
    c.style.fontSize = (18+Math.random()*22)+'px';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(), 2200);
  }
}

}

/* ===== Level 2c: Memory (para ihop) ===== */
let memCards = [];
let memFirstIdx = null;
let memBusy = false;
let memMatchedCount = 0;
let memTotalPairs = 0;
let memTimer = null;

function stopMemoryGame(){
  if (window.speechSynthesis) speechSynthesis.cancel();
  clearTimeout(memTimer);
  memFirstIdx = null; memBusy = false;
}
function startMemoryGame(cat){
  activeGameStop = stopMemoryGame;
  memFirstIdx = null; memBusy = false; memMatchedCount = 0;
  const n = Math.min(6, cat.items.length);
  const chosen = shuffle(cat.items).slice(0, n);
  memTotalPairs = chosen.length;
  const cards = [];
  chosen.forEach(item => { cards.push({ item, kind:'pic' }); cards.push({ item, kind:'word' }); });
  memCards = shuffle(cards);
  renderMemory();
}
function renderMemory(){
  memoryGrid.innerHTML = '';
  memCards.forEach((c, idx) => {
    const card = document.createElement('button');
    card.className = 'memory-card';
    card.dataset.idx = idx;
    card.textContent = '❓';
    card.addEventListener('click', () => onMemoryFlip(idx));
    memoryGrid.appendChild(card);
  });
}
function memoryCardContent(c){
  return c.kind === 'pic' ? pictureHTML(c.item) : `<div class="ko">${c.item.ko}</div><div class="rom">${c.item.rom}</div>`;
}
function onMemoryFlip(idx){
  if (memBusy) return;
  const cardEl = memoryGrid.querySelector(`[data-idx="${idx}"]`);
  if (!cardEl || cardEl.classList.contains('flipped') || cardEl.classList.contains('matched')) return;
  const c = memCards[idx];
  cardEl.classList.add('flipped');
  cardEl.innerHTML = memoryCardContent(c);
  if (c.kind === 'pic') sayKorean(c.item.ko);

  if (memFirstIdx === null){
    memFirstIdx = idx;
    return;
  }
  memBusy = true;
  const firstEl = memoryGrid.querySelector(`[data-idx="${memFirstIdx}"]`);
  const firstCard = memCards[memFirstIdx];
  if (firstCard.item === c.item){
    cardEl.classList.add('matched');
    firstEl.classList.add('matched');
    memMatchedCount++;
    memFirstIdx = null; memBusy = false;
    if (memMatchedCount === memTotalPairs){
      celebrate();
      playClap();
    }
  } else {
    cardEl.classList.add('wrong'); firstEl.classList.add('wrong');
    memTimer = setTimeout(() => {
      [cardEl, firstEl].forEach(el => { el.classList.remove('flipped','wrong'); el.textContent = '❓'; });
      memFirstIdx = null; memBusy = false;
    }, 900);
  }
}

/* ===== Level 2d: Sant eller falskt ===== */
let tfCurrent = null;      // pictured item
let tfSpokenItem = null;   // item whose Korean word is actually spoken
let tfCorrect = true;
let tfLocked = false;
let tfTimer = null;

function stopTrueFalseGame(){
  if (window.speechSynthesis) speechSynthesis.cancel();
  clearTimeout(tfTimer);
  tfLocked = false;
}
function startTrueFalseGame(cat){
  activeGameStop = stopTrueFalseGame;
  newTFRound(cat);
}
function newTFRound(cat){
  clearTimeout(tfTimer);
  tfLocked = false;
  tfYes.classList.remove('correct','wrong');
  tfNo.classList.remove('correct','wrong');
  tfRound++;
  tfCounterEl.textContent = `Fråga ${tfRound} / ${ROUNDS_PER_SESSION}`;
  const shown = cat.items[Math.floor(Math.random()*cat.items.length)];
  tfCurrent = shown;
  tfPicture.innerHTML = pictureHTML(shown);
  tfCorrect = Math.random() < 0.5 || cat.items.length < 2;
  tfSpokenItem = tfCorrect ? shown : shuffle(cat.items.filter(i => i !== shown))[0];
  playTF();
}
function playTF(){
  if (!tfSpokenItem) return;
  tfListenBtn.classList.add('speaking');
  sayKorean(tfSpokenItem.ko, null, () => tfListenBtn.classList.remove('speaking'));
}
function onTF(answerYes){
  if (tfLocked || !activeCat) return;
  tfLocked = true;
  const right = (answerYes === tfCorrect);
  const btn = answerYes ? tfYes : tfNo;
  if (right){
    btn.classList.add('correct');
    celebrate();
    sayKorean(tfSpokenItem.ko);
    if (tfRound >= ROUNDS_PER_SESSION) tfTimer = setTimeout(finishTFSession, 1200);
    else tfTimer = setTimeout(() => newTFRound(activeCat), 1900);
  } else {
    btn.classList.remove('wrong'); void btn.offsetWidth; btn.classList.add('wrong');
    playTF();
    tfLocked = false;
  }
}
function finishTFSession(){
  modeTrueFalseEl.classList.add('done');
  celebrate();
  playClap();
}
tfReplayBtn.addEventListener('click', () => {
  modeTrueFalseEl.classList.remove('done');
  tfRound = 0;
  startTrueFalseGame(activeCat);
});
tfYes.addEventListener('click', () => onTF(true));
tfNo.addEventListener('click', () => onTF(false));
tfListenBtn.addEventListener('click', playTF);

/* ===== Level 2e: Test — mixed quiz combining all categories ===== */
// Korean uses native-number "counting forms" before a counter word (개/마리/대):
// 하나→한, 둘→두, 셋→세, 넷→네; 다섯 and up stay the same.
const COUNT_FORMS = ["한","두","세","네","다섯","여섯","일곱","여덟","아홉","열"];
const NUM_EMOJI = ["1️⃣","2️⃣","3️⃣","4️⃣","5️⃣","6️⃣","7️⃣","8️⃣","9️⃣","🔟"];
// Detects a trailing consonant (batchim) to pick the right subject particle 이/가.
function hasBatchim(word){
  if (!word) return false;
  const code = word.charCodeAt(word.length - 1) - 0xAC00;
  if (code < 0 || code > 11171) return false;
  return code % 28 !== 0;
}
const testCountableCats = CATEGORIES.filter(c => c.counter);
const TEST_QUESTION_TYPES = ['count', 'howmany', 'category'];

let testTimer = null;
let testLocked = false;
let testReplaySpeak = null; // replays the current question's spoken prompt

function stopTestQuiz(){
  if (window.speechSynthesis) speechSynthesis.cancel();
  clearTimeout(testTimer);
  testLocked = false;
}
function startTestQuiz(){
  activeGameStop = stopTestQuiz;
  testWrap.classList.remove('done');
  testRound = 0;
  newTestRound();
}
function newTestRound(){
  clearTimeout(testTimer);
  testLocked = false;
  testRound++;
  testCounterEl.textContent = `Fråga ${testRound} / ${ROUNDS_PER_SESSION}`;
  const type = shuffle(TEST_QUESTION_TYPES)[0];
  if (type === 'count') renderCountQuestion();
  else if (type === 'howmany') renderHowManyQuestion();
  else renderCategoryQuestion();
}
function finishTestQuiz(){
  testWrap.classList.add('done');
  celebrate();
  playClap();
}
function testAdvance(){
  if (testRound >= ROUNDS_PER_SESSION) testTimer = setTimeout(finishTestQuiz, 1200);
  else testTimer = setTimeout(newTestRound, 1900);
}
function speakTestPrompt(phrase){
  testReplaySpeak = () => {
    testListenBtn.classList.add('speaking');
    sayKorean(phrase, null, () => testListenBtn.classList.remove('speaking'));
  };
  testReplaySpeak();
}
function renderScene(item, n){
  testScene.innerHTML = '';
  for (let i = 0; i < n; i++) testScene.appendChild(pictureNode(item));
}
function renderNumberChoices(correctN, poolMax){
  testChoices.innerHTML = '';
  const options = new Set([correctN]);
  let guard = 0;
  while (options.size < Math.min(4, poolMax) && guard++ < 50) options.add(1 + Math.floor(Math.random() * poolMax));
  shuffle([...options]).forEach(n => {
    const b = document.createElement('button');
    b.className = 'choice';
    b.textContent = NUM_EMOJI[n - 1];
    if (n === correctN) b.dataset.correct = '1';
    b.addEventListener('click', () => onTestAnswer(b, n === correctN));
    testChoices.appendChild(b);
  });
}
function onTestAnswer(btn, isCorrect){
  if (testLocked) return;
  testLocked = true;
  if (isCorrect){
    btn.classList.add('correct');
    celebrate();
    testAdvance();
  } else {
    // Never punish: little shake, let them try again — no answer reveal.
    btn.classList.remove('wrong'); void btn.offsetWidth; btn.classList.add('wrong');
    testLocked = false;
  }
}
function renderCountQuestion(){
  const cat = shuffle(testCountableCats)[0];
  const item = shuffle(cat.items)[0];
  const n = 3 + Math.floor(Math.random() * 7); // 3..9
  testPromptText.textContent = 'Hur många är det? 🔢';
  renderScene(item, n);
  speakTestPrompt(`${item.ko}${hasBatchim(item.ko) ? '이' : '가'} ${COUNT_FORMS[n - 1]} ${cat.counter} 있어요.`);
  renderNumberChoices(n, 10);
}
function renderHowManyQuestion(){
  const cat = shuffle(testCountableCats)[0];
  const item = shuffle(cat.items)[0];
  const c = 3 + Math.floor(Math.random() * 6); // 3..8
  const need = 1 + Math.floor(Math.random() * 3); // 1..3
  const target = Math.min(c + need, 10);
  const actualNeed = target - c;
  testPromptText.textContent = 'Hur många fler behövs? ➕';
  renderScene(item, c);
  const particle = hasBatchim(item.ko) ? '이' : '가';
  speakTestPrompt(`${item.ko}${particle} ${COUNT_FORMS[c - 1]} ${cat.counter} 있어요. ${COUNT_FORMS[target - 1]} ${cat.counter}가 필요해요. 몇 ${cat.counter} 더 필요해요?`);
  renderNumberChoices(actualNeed, 4);
}
function renderCategoryQuestion(){
  const pool = CATEGORIES.filter(c => !c.isTest);
  const cat = shuffle(pool)[0];
  const item = shuffle(cat.items)[0];
  testScene.innerHTML = '';
  testPromptText.textContent = 'Vilken kategori hör ordet till? 🧩';
  speakTestPrompt(item.ko);
  const wrongCats = shuffle(pool.filter(c => c !== cat)).slice(0, 3);
  const options = shuffle([cat, ...wrongCats]);
  testChoices.innerHTML = '';
  options.forEach(c => {
    const b = document.createElement('button');
    b.className = 'choice cat-choice';
    b.innerHTML = `<span>${c.emoji}</span><span class="cat-choice-label">${c.name}</span>`;
    if (c === cat) b.dataset.correct = '1';
    b.addEventListener('click', () => onTestAnswer(b, c === cat));
    testChoices.appendChild(b);
  });
}
testReplayBtn.addEventListener('click', () => { testWrap.classList.remove('done'); startTestQuiz(); });
testListenBtn.addEventListener('click', () => { if (testReplaySpeak) testReplaySpeak(); });

/* ===== Tab switching (within a category) ===== */
tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    tabs.forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    setScreen(tab.dataset.screen);
    if (tab.dataset.screen === 'game'){
      switchGameMode(activeGameMode);
    } else if (activeGameStop) {
      activeGameStop();
    }
  });
});

/* Warm up speech + audio on first touch (needed on mobile) */
document.body.addEventListener('touchstart', function warm(){
  if (window.speechSynthesis){ const u=new SpeechSynthesisUtterance(' '); speechSynthesis.speak(u); }
  getAudioCtx();
  document.body.removeEventListener('touchstart', warm);
}, { once:true });
</script>
