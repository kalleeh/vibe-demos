<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>A New Hope — vibe-demos</title>
  </head>
  <body>
    <div data-composition-id="root" data-start="0" data-duration="2" data-width="1920" data-height="1080">
      <div
        id="placeholder"
        class="clip"
        data-start="0"
        data-duration="2"
        data-track-index="0"
        style="width:100%;height:100%;background:#000;color:#FFE81F;display:flex;align-items:center;justify-content:center;font-family:system-ui;font-size:96px;"
      >
        Hello, galaxy.
      </div>
      <style>
        body {
          margin: 0;
        }
      </style>
      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        tl.from("#placeholder", { opacity: 0, duration: 0.4, ease: "power2.out" }, 0);
        window.__timelines["root"] = tl;
      </script>
    </div>
  </body>
</html>
