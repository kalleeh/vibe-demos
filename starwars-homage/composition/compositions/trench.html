<template id="scene-trench-template">
  <div data-composition-id="scene-trench" data-width="1920" data-height="1080"
       data-layout-allow-overflow
       style="position:relative;width:100%;height:100%;overflow:hidden;background:#04060a;perspective:900px;perspective-origin:50% 50%;">

    <!-- Camera-shake wrapper: every visual layer except the final flash sits inside this so
         turret hits jolt the whole frame uniformly. -->
    <div id="trench-camera" class="clip" data-start="0" data-duration="8" data-track-index="0"
         data-layout-allow-overflow
         style="position:absolute;inset:0;overflow:hidden;">

      <!-- Vanishing-point glow: hard cyan-white core that grows as we close -->
      <div id="trench-vp"
           style="position:absolute;left:50%;top:50%;width:520px;height:520px;
                  transform:translate(-50%,-50%);
                  background:radial-gradient(circle at 50% 50%,
                    #FFFFFF 0%,
                    #9FE9FF 30%,
                    rgba(159,233,255,0) 70%);
                  mix-blend-mode:screen;"></div>

      <!-- Trench: a 3D stack of perspective rings rendered as concentric quads -->
      <div id="trench-stage"
           data-layout-allow-overflow
           style="position:absolute;inset:0;transform-style:preserve-3d;">
        <!-- Built dynamically below. -->
      </div>

      <!-- TIE Fighter pursuit silhouettes — viewer-perspective chase. -->
      <svg id="trench-ties"
           viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice"
           data-layout-allow-overflow
           style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:visible;">
        <defs>
          <!-- TIE Fighter silhouette: central pod + two hex solar panels. -->
          <symbol id="tie-shape" viewBox="-200 -120 400 240" overflow="visible">
            <!-- Left wing pylon -->
            <rect x="-66" y="-3" width="32" height="6" fill="#050810" stroke="#2a323d" stroke-width="0.8"/>
            <!-- Right wing pylon -->
            <rect x="34" y="-3" width="32" height="6" fill="#050810" stroke="#2a323d" stroke-width="0.8"/>
            <!-- Left hex solar panel -->
            <polygon points="-180,-90 -70,-90 -34,0 -70,90 -180,90 -180,-90"
                     fill="#050810" stroke="#2a323d" stroke-width="1.2"/>
            <line x1="-180" y1="-90" x2="-34" y2="0" stroke="#2a323d" stroke-width="0.6" opacity="0.55"/>
            <line x1="-180" y1="90"  x2="-34" y2="0" stroke="#2a323d" stroke-width="0.6" opacity="0.55"/>
            <line x1="-126" y1="-90" x2="-126" y2="90" stroke="#2a323d" stroke-width="0.5" opacity="0.5"/>
            <!-- Right hex solar panel -->
            <polygon points="180,-90 70,-90 34,0 70,90 180,90 180,-90"
                     fill="#050810" stroke="#2a323d" stroke-width="1.2"/>
            <line x1="180" y1="-90" x2="34" y2="0" stroke="#2a323d" stroke-width="0.6" opacity="0.55"/>
            <line x1="180" y1="90"  x2="34" y2="0" stroke="#2a323d" stroke-width="0.6" opacity="0.55"/>
            <line x1="126" y1="-90" x2="126" y2="90" stroke="#2a323d" stroke-width="0.5" opacity="0.5"/>
            <!-- Central pod (octagon) -->
            <polygon points="-22,-26 22,-26 30,-10 30,10 22,26 -22,26 -30,10 -30,-10"
                     fill="#050810" stroke="#2a323d" stroke-width="1.4"/>
            <!-- Cockpit window -->
            <polygon points="-12,-12 12,-12 16,-4 16,4 12,12 -12,12 -16,4 -16,-4"
                     fill="#0a0e14" stroke="#2a323d" stroke-width="0.8"/>
            <!-- Engine glow dots (left + right wing centres) -->
            <circle class="tie-glow" cx="-105" cy="0" r="3.5" fill="#FF3030" opacity="0.85"/>
            <circle class="tie-glow" cx="105"  cy="0" r="3.5" fill="#FF3030" opacity="0.85"/>
          </symbol>
        </defs>

        <!-- Primary TIE: center, growing from far -->
        <g id="tie-1" transform="translate(960 540) scale(0.15)" opacity="0">
          <use href="#tie-shape"/>
        </g>
        <!-- Secondary TIE: upper-right, smaller -->
        <g id="tie-2" transform="translate(1320 360) scale(0.3)" opacity="0">
          <use href="#tie-shape"/>
        </g>
      </svg>

      <!-- Motion streaks SVG: 24+ thin diagonal cyan lines along floor + walls converging on VP -->
      <svg id="trench-streaks"
           viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice"
           style="position:absolute;inset:0;width:100%;height:100%;mix-blend-mode:screen;pointer-events:none;">
        <g stroke="#9FE9FF" stroke-width="2" stroke-linecap="round">
          <!-- Floor streaks -->
          <line class="streak" x1="960" y1="540" x2="120"  y2="980"/>
          <line class="streak" x1="960" y1="540" x2="380"  y2="1020"/>
          <line class="streak" x1="960" y1="540" x2="640"  y2="1060"/>
          <line class="streak" x1="960" y1="540" x2="1280" y2="1060"/>
          <line class="streak" x1="960" y1="540" x2="1540" y2="1020"/>
          <line class="streak" x1="960" y1="540" x2="1800" y2="980"/>
          <line class="streak" x1="960" y1="540" x2="240"  y2="900"/>
          <line class="streak" x1="960" y1="540" x2="1680" y2="900"/>
          <line class="streak" x1="960" y1="540" x2="60"   y2="1040"/>
          <line class="streak" x1="960" y1="540" x2="1860" y2="1040"/>
          <line class="streak" x1="960" y1="540" x2="500"  y2="1075"/>
          <line class="streak" x1="960" y1="540" x2="1420" y2="1075"/>
          <!-- Left wall streaks -->
          <line class="streak" x1="960" y1="540" x2="40"   y2="200"/>
          <line class="streak" x1="960" y1="540" x2="80"   y2="420"/>
          <line class="streak" x1="960" y1="540" x2="160"  y2="660"/>
          <line class="streak" x1="960" y1="540" x2="280"  y2="780"/>
          <line class="streak" x1="960" y1="540" x2="20"   y2="540"/>
          <line class="streak" x1="960" y1="540" x2="100"  y2="120"/>
          <!-- Right wall streaks -->
          <line class="streak" x1="960" y1="540" x2="1880" y2="200"/>
          <line class="streak" x1="960" y1="540" x2="1840" y2="420"/>
          <line class="streak" x1="960" y1="540" x2="1760" y2="660"/>
          <line class="streak" x1="960" y1="540" x2="1640" y2="780"/>
          <line class="streak" x1="960" y1="540" x2="1900" y2="540"/>
          <line class="streak" x1="960" y1="540" x2="1820" y2="120"/>
          <!-- Ceiling-edge streaks -->
          <line class="streak" x1="960" y1="540" x2="540"  y2="60"/>
          <line class="streak" x1="960" y1="540" x2="1380" y2="60"/>
        </g>
      </svg>

      <!-- Exhaust port — small dark recessed cube at vanishing point. -->
      <svg id="trench-exhaust"
           viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice"
           style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;opacity:0;">
        <g transform="translate(960 540)">
          <!-- Outer recessed frame -->
          <rect x="-22" y="-22" width="44" height="44" fill="#0a0e14" stroke="#2a323d" stroke-width="1.2"/>
          <!-- Inner shadow rim -->
          <rect x="-18" y="-18" width="36" height="36" fill="#04060a" stroke="#11161d" stroke-width="0.8"/>
          <!-- Black inner hole -->
          <rect id="trench-exhaust-hole" x="-12" y="-12" width="24" height="24" fill="#000000"/>
          <!-- Red glow halo (faint, ramps up) -->
          <rect id="trench-exhaust-glow" x="-12" y="-12" width="24" height="24"
                fill="#FF3030" opacity="0" style="mix-blend-mode:screen;filter:blur(3px);"/>
        </g>
      </svg>

      <!-- Laser bolts SVG (4 streaks pulsing toward viewer). Each is layered: cyan halo + red bolt + white core. -->
      <svg id="trench-lasers"
           viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice"
           style="position:absolute;inset:0;width:100%;height:100%;mix-blend-mode:screen;">
        <defs>
          <linearGradient id="laser-halo" x1="0%" y1="50%" x2="100%" y2="50%">
            <stop offset="0%"  stop-color="#9FE9FF" stop-opacity="0"/>
            <stop offset="60%" stop-color="#9FE9FF" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.9"/>
          </linearGradient>
          <linearGradient id="laser-bolt" x1="0%" y1="50%" x2="100%" y2="50%">
            <stop offset="0%"  stop-color="#FF3030" stop-opacity="0"/>
            <stop offset="50%" stop-color="#FF3030" stop-opacity="0.95"/>
            <stop offset="100%" stop-color="#FFFFFF"/>
          </linearGradient>
          <linearGradient id="laser-core" x1="0%" y1="50%" x2="100%" y2="50%">
            <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0"/>
            <stop offset="70%" stop-color="#FFFFFF" stop-opacity="1"/>
            <stop offset="100%" stop-color="#FFFFFF"/>
          </linearGradient>
        </defs>
        <g id="laser-1" transform="translate(960 540)">
          <rect x="-280" y="-9" width="280" height="18" fill="url(#laser-halo)" rx="9"/>
          <rect x="-260" y="-4" width="260" height="8"  fill="url(#laser-bolt)" rx="4"/>
          <rect x="-240" y="-1.5" width="240" height="3" fill="url(#laser-core)" rx="1.5"/>
        </g>
        <g id="laser-2" transform="translate(960 540)">
          <rect x="-280" y="-9" width="280" height="18" fill="url(#laser-halo)" rx="9"/>
          <rect x="-260" y="-4" width="260" height="8"  fill="url(#laser-bolt)" rx="4"/>
          <rect x="-240" y="-1.5" width="240" height="3" fill="url(#laser-core)" rx="1.5"/>
        </g>
        <g id="laser-3" transform="translate(960 540)">
          <rect x="-280" y="-9" width="280" height="18" fill="url(#laser-halo)" rx="9"/>
          <rect x="-260" y="-4" width="260" height="8"  fill="url(#laser-bolt)" rx="4"/>
          <rect x="-240" y="-1.5" width="240" height="3" fill="url(#laser-core)" rx="1.5"/>
        </g>
        <g id="laser-4" transform="translate(960 540)">
          <rect x="-280" y="-9" width="280" height="18" fill="url(#laser-halo)" rx="9"/>
          <rect x="-260" y="-4" width="260" height="8"  fill="url(#laser-bolt)" rx="4"/>
          <rect x="-240" y="-1.5" width="240" height="3" fill="url(#laser-core)" rx="1.5"/>
        </g>
      </svg>

      <!-- Targeting computer HUD -->
      <svg id="trench-hud"
           viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice"
           style="position:absolute;inset:0;width:100%;height:100%;opacity:0;">
        <g stroke="#9FE9FF" fill="none" stroke-width="1.5" opacity="0.85">
          <!-- Reticle frame -->
          <rect x="660" y="320" width="600" height="440" rx="0"/>
          <!-- Tick marks -->
          <line x1="660" y1="540" x2="700" y2="540"/>
          <line x1="1220" y1="540" x2="1260" y2="540"/>
          <line x1="960" y1="320" x2="960" y2="360"/>
          <line x1="960" y1="720" x2="960" y2="760"/>
          <!-- Crosshair box (jitters, then snaps to exhaust port) -->
          <rect id="trench-target" x="900" y="480" width="120" height="120"/>
          <!-- Corner brackets -->
          <polyline points="900,480 900,460 920,460"/>
          <polyline points="1020,460 1000,460 1020,460"/>
          <polyline points="1000,460 1020,460 1020,480"/>
          <polyline points="900,600 900,620 920,620"/>
          <polyline points="1020,620 1020,600"/>
        </g>

        <!-- Spinning data widget: top-left -->
        <g id="hud-widget-tl" transform="translate(220 220)" stroke="#9FE9FF" fill="none" opacity="0.75">
          <circle r="56" stroke-width="1.2"/>
          <circle r="42" stroke-width="1" stroke-dasharray="4 6"/>
          <circle r="28" stroke-width="1"/>
          <line x1="-56" y1="0" x2="-28" y2="0" stroke-width="1.2"/>
          <line x1="28"  y1="0" x2="56"  y2="0" stroke-width="1.2"/>
          <line x1="0" y1="-56" x2="0" y2="-28" stroke-width="1.2"/>
          <line x1="0" y1="28"  x2="0" y2="56"  stroke-width="1.2"/>
          <rect x="-4" y="-4" width="8" height="8" fill="#9FE9FF" stroke="none"/>
        </g>

        <!-- Spinning data widget: top-right -->
        <g id="hud-widget-tr" transform="translate(1700 220)" stroke="#9FE9FF" fill="none" opacity="0.75">
          <polygon points="0,-50 43,-25 43,25 0,50 -43,25 -43,-25" stroke-width="1.2"/>
          <polygon points="0,-30 26,-15 26,15 0,30 -26,15 -26,-15" stroke-width="1" stroke-dasharray="3 5"/>
          <line x1="-50" y1="0" x2="50"  y2="0" stroke-width="1"/>
          <line x1="0" y1="-50" x2="0" y2="50" stroke-width="1"/>
        </g>

        <!-- Spinning data widget: bottom-right (smaller) -->
        <g id="hud-widget-br" transform="translate(1700 860)" stroke="#9FE9FF" fill="none" opacity="0.75">
          <circle r="44" stroke-width="1.2"/>
          <circle r="32" stroke-width="1" stroke-dasharray="2 4"/>
          <line x1="-44" y1="0" x2="44" y2="0" stroke-width="1"/>
          <line x1="0" y1="-44" x2="0" y2="44" stroke-width="1"/>
          <circle r="6" fill="#9FE9FF" stroke="none"/>
        </g>

        <!-- Horizon / pitch indicator: bottom-center, gently sways -->
        <g id="hud-horizon" transform="translate(960 960)" stroke="#9FE9FF" fill="none" opacity="0.8">
          <circle r="60" stroke-width="1.2"/>
          <g id="hud-horizon-tilt">
            <line x1="-54" y1="0" x2="-22" y2="0" stroke-width="1.6"/>
            <line x1="22"  y1="0" x2="54"  y2="0" stroke-width="1.6"/>
            <polygon points="-6,0 0,-7 6,0" fill="#9FE9FF" stroke="none"/>
            <line x1="-14" y1="6" x2="-8" y2="6" stroke-width="1"/>
            <line x1="8"   y1="6" x2="14" y2="6" stroke-width="1"/>
          </g>
          <line x1="-66" y1="0" x2="-58" y2="0" stroke-width="1"/>
          <line x1="58"  y1="0" x2="66"  y2="0" stroke-width="1"/>
          <line x1="0" y1="-66" x2="0" y2="-58" stroke-width="1"/>
        </g>

        <g fill="#9FE9FF" font-family="monospace" font-size="20" opacity="0.9" letter-spacing="2">
          <text x="660" y="305">EXHAUST PORT — 2M</text>
          <text x="660" y="785">STAY ON TARGET</text>
          <text x="1140" y="785" text-anchor="end">RED FIVE</text>
        </g>

        <!-- Target lock alert: blinks red near the reticle -->
        <g id="hud-lock" opacity="0">
          <text x="960" y="290" text-anchor="middle"
                fill="#FF3030" font-family="monospace" font-size="22"
                letter-spacing="3" font-weight="bold">TARGET LOCK ACQUIRED</text>
          <line x1="780" y1="298" x2="900" y2="298" stroke="#FF3030" stroke-width="1.4"/>
          <line x1="1020" y1="298" x2="1140" y2="298" stroke="#FF3030" stroke-width="1.4"/>
        </g>

        <!-- Distance readout: 6 stacked text spans crossfading (last is the 0.0KM red flash) -->
        <g font-family="monospace" font-size="22" letter-spacing="2" fill="#9FE9FF">
          <text x="220" y="860" id="dist-1" opacity="0">DIST: 2.0KM</text>
          <text x="220" y="860" id="dist-2" opacity="0">DIST: 1.5KM</text>
          <text x="220" y="860" id="dist-3" opacity="0">DIST: 1.0KM</text>
          <text x="220" y="860" id="dist-4" opacity="0">DIST: 0.5KM</text>
          <text x="220" y="860" id="dist-5" opacity="0">DIST: 0.1KM</text>
          <text x="220" y="860" id="dist-6" opacity="0" fill="#FF3030" font-weight="bold">DIST: 0.0KM</text>
        </g>
      </svg>

      <!-- Cockpit foreground frame (chromatic-shake duplicate behind for hit punctuation) -->
      <svg id="trench-cockpit-shadow"
           viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice"
           style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;opacity:0;mix-blend-mode:screen;">
        <path d="M0,0 L1920,0 L1920,140 L1620,210 L1380,250 L1080,260 L840,250 L540,210 L300,180 L0,140 Z"
              fill="#FF3030" opacity="0.55"/>
        <path d="M0,1080 L0,920 L240,860 L520,830 L820,820 L1100,820 L1380,830 L1660,860 L1920,920 L1920,1080 Z"
              fill="#FF3030" opacity="0.55"/>
        <path d="M0,140 L120,200 L120,880 L0,920 Z" fill="#FF3030" opacity="0.55"/>
        <path d="M1920,140 L1800,200 L1800,880 L1920,920 Z" fill="#FF3030" opacity="0.55"/>
      </svg>

      <svg id="trench-cockpit"
           viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice"
           style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;">
        <!-- Top frame -->
        <path d="M0,0 L1920,0 L1920,140 L1620,210 L1380,250 L1080,260 L840,250 L540,210 L300,180 L0,140 Z"
              fill="#0a0a0a" opacity="0.95"/>
        <!-- Bottom frame with thrust ring -->
        <path d="M0,1080 L0,920 L240,860 L520,830 L820,820 L1100,820 L1380,830 L1660,860 L1920,920 L1920,1080 Z"
              fill="#0a0a0a" opacity="0.95"/>
        <!-- Side struts -->
        <path d="M0,140 L120,200 L120,880 L0,920 Z" fill="#0a0a0a" opacity="0.95"/>
        <path d="M1920,140 L1800,200 L1800,880 L1920,920 Z" fill="#0a0a0a" opacity="0.95"/>

        <!-- Instrument panel LED dots along the bottom edge (cyan + amber) -->
        <g>
          <circle id="led-1" cx="540"  cy="900" r="8" fill="#9FE9FF" opacity="0.9"/>
          <circle id="led-2" cx="780"  cy="888" r="8" fill="#FFB347" opacity="0.9"/>
          <circle id="led-3" cx="1140" cy="888" r="8" fill="#9FE9FF" opacity="0.9"/>
          <circle id="led-4" cx="1380" cy="900" r="8" fill="#FFB347" opacity="0.9"/>
        </g>
      </svg>

      <!-- Explosion bloom — banded radial burst growing from VP after the strike. -->
      <div id="trench-bloom"
           style="position:absolute;left:50%;top:50%;width:520px;height:520px;
                  transform:translate(-50%,-50%) scale(0);
                  background:radial-gradient(circle at 50% 50%,
                    #FFFFFF 0%,
                    #FFFFFF 8%,
                    #FFE81F 22%,
                    #FFB347 38%,
                    #FF3030 58%,
                    rgba(255,48,48,0.4) 78%,
                    rgba(255,48,48,0) 100%);
                  mix-blend-mode:screen;opacity:0;pointer-events:none;"></div>

    </div>

    <!-- Screen flash overlay (just before transition out) — outside camera so shake doesn't pull it. -->
    <div id="trench-flash" class="clip" data-start="6.6" data-duration="1.4" data-track-index="6"
         style="position:absolute;inset:0;background:#FFFFFF;opacity:0;mix-blend-mode:screen;pointer-events:none;"></div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        // Mulberry32 PRNG — deterministic pseudo-random for greeble placement.
        function mulberry32(seed) {
          return function () {
            seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
            let t = seed;
            t = Math.imul(t ^ (t >>> 15), t | 1);
            t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
            return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
          };
        }
        const rnd = mulberry32(0x5A77E5);
        const rndStreak = mulberry32(0xC0FFEE);

        // Build trench: stack 26 segments along Z. Each segment has floor+walls+greebles.
        const stage = document.getElementById("trench-stage");
        const SEG_LEN = 220;       // virtual depth per segment
        const SEG_COUNT = 26;

        // Towers placed at specific segment indices — boxy structures rising from floor.
        const towerSegs = new Set([4, 9, 14, 19]);

        for (let i = 0; i < SEG_COUNT; i++) {
          const z = -i * SEG_LEN;
          const seg = document.createElement("div");
          seg.className = "trench-seg";
          seg.dataset.idx = i;
          seg.style.cssText =
            "position:absolute;left:50%;top:50%;width:1920px;height:1080px;" +
            "transform:translate(-50%,-50%) translateZ(" + z + "px);" +
            "transform-style:preserve-3d;";

          // FLOOR — cel-shaded slab with subtle perspective grid lines
          const floor = document.createElement("div");
          floor.style.cssText =
            "position:absolute;left:50%;top:50%;width:1400px;height:" + SEG_LEN + "px;" +
            "transform:translate(-50%,0) rotateX(90deg) translateZ(-220px);" +
            "background:#0a0e14;" +
            "border-top:1px solid #2a323d;border-bottom:1px solid #2a323d;";

          // 6 thin parallel grid lines along the floor (running with the trench)
          for (let g = 0; g < 6; g++) {
            const gline = document.createElement("div");
            const xPct = 8 + g * 17;
            gline.style.cssText =
              "position:absolute;left:" + xPct + "%;top:0;width:1px;height:100%;" +
              "background:#2a323d;opacity:0.85;";
            floor.appendChild(gline);
          }

          // LEFT WALL — three-band cel shading
          const lw = document.createElement("div");
          lw.style.cssText =
            "position:absolute;left:50%;top:50%;width:" + SEG_LEN + "px;height:1080px;" +
            "transform:translate(-700px,-50%) rotateY(90deg);" +
            "background:#1a222c;" +
            "border-right:1px solid #2a323d;border-left:1px solid #2a323d;";

          const lwTop = document.createElement("div");
          lwTop.style.cssText =
            "position:absolute;left:0;top:0;width:100%;height:36%;" +
            "background:#2a323d;border-bottom:1px solid #2a323d;";
          const lwBot = document.createElement("div");
          lwBot.style.cssText =
            "position:absolute;left:0;bottom:0;width:100%;height:32%;" +
            "background:#0a0e14;border-top:1px solid #2a323d;";
          lw.appendChild(lwTop);
          lw.appendChild(lwBot);

          // RIGHT WALL — same banding, mirrored
          const rw = document.createElement("div");
          rw.style.cssText =
            "position:absolute;left:50%;top:50%;width:" + SEG_LEN + "px;height:1080px;" +
            "transform:translate(700px,-50%) rotateY(-90deg);" +
            "background:#1a222c;" +
            "border-right:1px solid #2a323d;border-left:1px solid #2a323d;";
          const rwTop = document.createElement("div");
          rwTop.style.cssText =
            "position:absolute;left:0;top:0;width:100%;height:36%;" +
            "background:#2a323d;border-bottom:1px solid #2a323d;";
          const rwBot = document.createElement("div");
          rwBot.style.cssText =
            "position:absolute;left:0;bottom:0;width:100%;height:32%;" +
            "background:#0a0e14;border-top:1px solid #2a323d;";
          rw.appendChild(rwTop);
          rw.appendChild(rwBot);

          // VERTICAL STRUT — every segment, varied position
          const strutXL = 6 + Math.floor(rnd() * 80);
          const strutXR = 6 + Math.floor(rnd() * 80);
          const strutL = document.createElement("div");
          strutL.style.cssText =
            "position:absolute;left:" + strutXL + "%;top:8%;width:8px;height:84%;" +
            "background:#222a36;border-left:1px solid #2a323d;border-right:1px solid #11161d;";
          const strutR = document.createElement("div");
          strutR.style.cssText =
            "position:absolute;left:" + strutXR + "%;top:8%;width:8px;height:84%;" +
            "background:#222a36;border-left:1px solid #2a323d;border-right:1px solid #11161d;";
          lw.appendChild(strutL);
          rw.appendChild(strutR);

          // CROSSBAR — every other segment, with rust accent
          if (i % 2 === 0) {
            const crossL = document.createElement("div");
            crossL.style.cssText =
              "position:absolute;left:0;top:36%;width:100%;height:18px;" +
              "background:#222a36;border-top:1px solid #2a323d;border-bottom:1px solid #11161d;";
            const crossR = document.createElement("div");
            crossR.style.cssText =
              "position:absolute;left:0;top:62%;width:100%;height:14px;" +
              "background:#1d242e;border-top:1px solid #2a323d;border-bottom:1px solid #11161d;";

            const rustL = document.createElement("div");
            rustL.style.cssText =
              "position:absolute;left:18%;top:38%;width:16px;height:10px;" +
              "background:#c45627;border:1px solid #2a323d;";
            const rustR = document.createElement("div");
            rustR.style.cssText =
              "position:absolute;left:62%;top:64%;width:16px;height:10px;" +
              "background:#c45627;border:1px solid #2a323d;";

            lw.appendChild(crossL);
            lw.appendChild(rustL);
            rw.appendChild(crossR);
            rw.appendChild(rustR);
          }

          // HORIZONTAL DUCT — every 3rd segment
          if (i % 3 === 0) {
            const ductL = document.createElement("div");
            ductL.style.cssText =
              "position:absolute;left:0;top:48%;width:100%;height:6px;" +
              "background:#11161d;border-top:1px solid #2a323d;border-bottom:1px solid #2a323d;";
            const ductR = document.createElement("div");
            ductR.style.cssText =
              "position:absolute;left:0;top:52%;width:100%;height:6px;" +
              "background:#11161d;border-top:1px solid #2a323d;border-bottom:1px solid #2a323d;";
            lw.appendChild(ductL);
            rw.appendChild(ductR);
          }

          // GLOWING SERVICE LIGHT — every 4th segment, alternating cyan/red
          if (i % 4 === 0) {
            const lightColor = (i % 8 === 0) ? "#9FE9FF" : "#FF3030";
            const lightL = document.createElement("div");
            lightL.style.cssText =
              "position:absolute;left:46%;top:42%;width:10px;height:6px;" +
              "background:" + lightColor + ";border:1px solid #2a323d;" +
              "box-shadow:0 0 12px " + lightColor + ";";
            const lightR = document.createElement("div");
            lightR.style.cssText =
              "position:absolute;left:46%;top:58%;width:10px;height:6px;" +
              "background:" + lightColor + ";border:1px solid #2a323d;" +
              "box-shadow:0 0 12px " + lightColor + ";";
            lw.appendChild(lightL);
            rw.appendChild(lightR);
          }

          // ALCOVE / RECESSED DOORWAY — segments where i % 5 === 2 (so 2, 7, 12, 17, 22),
          // staggered side selection so they don't always mirror.
          if (i % 5 === 2) {
            const alcoveSide = (i % 10 === 2) ? "left" : ((i % 10 === 7) ? "right" : "both");
            const buildAlcove = function (parent, mirrored) {
              const xPct = mirrored ? (60 + Math.floor(rnd() * 12)) : (16 + Math.floor(rnd() * 12));
              const alc = document.createElement("div");
              alc.style.cssText =
                "position:absolute;left:" + xPct + "%;top:24%;width:64px;height:52%;" +
                "background:#04060a;border:1px solid #2a323d;" +
                "box-shadow:inset 0 0 14px #000000;";
              const sill = document.createElement("div");
              sill.style.cssText =
                "position:absolute;left:0;bottom:0;width:100%;height:8px;" +
                "background:#11161d;border-top:1px solid #2a323d;";
              const lintel = document.createElement("div");
              lintel.style.cssText =
                "position:absolute;left:0;top:0;width:100%;height:6px;" +
                "background:#222a36;border-bottom:1px solid #2a323d;";
              const innerLight = document.createElement("div");
              innerLight.style.cssText =
                "position:absolute;left:42%;top:20%;width:6px;height:4px;" +
                "background:#FF3030;box-shadow:0 0 8px #FF3030;opacity:0.65;";
              alc.appendChild(lintel);
              alc.appendChild(sill);
              alc.appendChild(innerLight);
              parent.appendChild(alc);
            };
            if (alcoveSide === "left" || alcoveSide === "both") buildAlcove(lw, false);
            if (alcoveSide === "right" || alcoveSide === "both") buildAlcove(rw, true);
          }

          // BIG TOWER GREEBLES — boxy structures rising from the floor at certain segments
          if (towerSegs.has(i)) {
            const towerSide = (i % 2 === 0) ? "left" : "right";
            const towerLR = (towerSide === "left") ? -380 : 380;

            const tower = document.createElement("div");
            tower.style.cssText =
              "position:absolute;left:50%;top:50%;width:140px;height:380px;" +
              "transform:translate(" + (towerLR - 70) + "px," + (-380 + 220) + "px);" +
              "background:#1a222c;border:1px solid #2a323d;";

            const tTop = document.createElement("div");
            tTop.style.cssText =
              "position:absolute;left:0;top:0;width:100%;height:30%;" +
              "background:#2a323d;border-bottom:1px solid #2a323d;";
            const tBot = document.createElement("div");
            tBot.style.cssText =
              "position:absolute;left:0;bottom:0;width:100%;height:34%;" +
              "background:#0a0e14;border-top:1px solid #2a323d;";
            const tStripe = document.createElement("div");
            tStripe.style.cssText =
              "position:absolute;left:0;top:46%;width:100%;height:6px;" +
              "background:#c45627;border-top:1px solid #2a323d;border-bottom:1px solid #2a323d;";
            const tLight = document.createElement("div");
            tLight.style.cssText =
              "position:absolute;left:38%;top:62%;width:18px;height:8px;" +
              "background:#9FE9FF;border:1px solid #2a323d;box-shadow:0 0 14px #9FE9FF;";

            tower.appendChild(tTop);
            tower.appendChild(tBot);
            tower.appendChild(tStripe);
            tower.appendChild(tLight);
            seg.appendChild(tower);
          }

          seg.appendChild(floor);
          seg.appendChild(lw);
          seg.appendChild(rw);
          stage.appendChild(seg);
        }

        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // CAMERA: trench rushes toward viewer — fly through the stack.
        const totalZ = SEG_LEN * (SEG_COUNT - 6);
        tl.fromTo("#trench-stage",
          { z: -totalZ * 0.2 },
          { z: totalZ, duration: 7.2, ease: "power1.in" }, 0);

        // Vanishing-point glow grows brighter as we close
        tl.fromTo("#trench-vp",
          { opacity: 0.5, scale: 0.6 },
          { opacity: 1.0, scale: 2.1, duration: 7.0, ease: "power2.in" }, 0);

        // HUD fades in (red leader's targeting computer)
        tl.fromTo("#trench-hud", { opacity: 0 }, { opacity: 1, duration: 0.6, ease: "power2.out" }, 0.4);

        // Targeting box jitters subtly — early phase
        tl.fromTo("#trench-target",
          { x: -10, y: -6 },
          { x: 12, y: 8, duration: 0.4, ease: "sine.inOut", yoyo: true, repeat: 11 }, 1.0);

        // At t=6.5 the target box snaps onto the exhaust port (centered on 960,540).
        // Original rect anchor is x=900,y=480 -> center 960,540, so x/y stays at 0.
        tl.to("#trench-target",
          { x: 0, y: 0, attr: { width: 60, height: 60, x: 930, y: 510 },
            duration: 0.18, ease: "power3.out" }, 6.45);

        // Spinning HUD widgets — full 360 over the duration of the shot
        tl.fromTo("#hud-widget-tl",
          { rotation: 0, transformOrigin: "220px 220px" },
          { rotation: 360, transformOrigin: "220px 220px", duration: 8, ease: "none" }, 0);
        tl.fromTo("#hud-widget-tr",
          { rotation: 0, transformOrigin: "1700px 220px" },
          { rotation: -360, transformOrigin: "1700px 220px", duration: 8, ease: "none" }, 0);
        tl.fromTo("#hud-widget-br",
          { rotation: 0, transformOrigin: "1700px 860px" },
          { rotation: 360, transformOrigin: "1700px 860px", duration: 8, ease: "none" }, 0);

        // Horizon indicator — gentle sway
        tl.fromTo("#hud-horizon-tilt",
          { rotation: -6, transformOrigin: "0px 0px" },
          { rotation: 6, transformOrigin: "0px 0px",
            duration: 1.6, ease: "sine.inOut", yoyo: true, repeat: 4 }, 0.4);

        // Distance readout — crossfade through 6 pre-rendered values; final is red 0.0KM
        const distSteps = ["#dist-1", "#dist-2", "#dist-3", "#dist-4", "#dist-5", "#dist-6"];
        const distStarts = [0.6, 1.8, 3.0, 4.2, 5.2, 6.4];
        const distHolds  = [1.1, 1.1, 1.1, 0.9, 1.1, 1.4];
        for (let d = 0; d < distSteps.length; d++) {
          tl.to(distSteps[d], { opacity: 0.95, duration: 0.25, ease: "power2.out" }, distStarts[d]);
          tl.to(distSteps[d], { opacity: 0,    duration: 0.25, ease: "power2.in"  }, distStarts[d] + distHolds[d]);
        }
        // Final 0.0KM — red flash pulse, second visibility hit
        tl.fromTo("#dist-6",
          { opacity: 0.4 },
          { opacity: 1.0, duration: 0.18, ease: "sine.inOut", yoyo: true, repeat: 5 }, 6.5);

        // Cockpit foreground subtly bobs
        tl.fromTo("#trench-cockpit",
          { y: -4 },
          { y: 4, duration: 0.6, ease: "sine.inOut", yoyo: true, repeat: 10 }, 0);

        // Instrument panel LEDs — gently pulse, finite repeats, varied timing
        tl.fromTo("#led-1", { opacity: 0.4 }, { opacity: 1.0, duration: 0.7, ease: "sine.inOut", yoyo: true, repeat: 10 }, 0);
        tl.fromTo("#led-2", { opacity: 0.5 }, { opacity: 1.0, duration: 0.9, ease: "sine.inOut", yoyo: true, repeat: 8  }, 0.2);
        tl.fromTo("#led-3", { opacity: 0.4 }, { opacity: 1.0, duration: 0.6, ease: "sine.inOut", yoyo: true, repeat: 12 }, 0.1);
        tl.fromTo("#led-4", { opacity: 0.6 }, { opacity: 1.0, duration: 1.1, ease: "sine.inOut", yoyo: true, repeat: 6  }, 0.3);

        // Motion streaks — scale outward from VP, finite repeats. Per-streak seeded offsets so
        // they don't all bloom in lock-step.
        const streakNodes = document.querySelectorAll(".streak");
        streakNodes.forEach(function (node, idx) {
          const delay = rndStreak() * 0.45;
          const dur   = 0.42 + rndStreak() * 0.4;
          const peakOpacity = 0.3 + rndStreak() * 0.2;
          const peakScale = 1.2 + rndStreak() * 0.5;
          const repeats = 8 + Math.floor(rndStreak() * 5);
          tl.fromTo(node,
            { opacity: 0, transformOrigin: "960px 540px", scale: 0.18 },
            { opacity: peakOpacity, scale: peakScale, duration: dur, ease: "power2.out",
              repeat: repeats, repeatDelay: rndStreak() * 0.15 }, delay);
        });

        // TIE FIGHTER 1 — appears centered at t=2.5, grows from 0.15 to 0.6 over 3s,
        // sways horizontally with finite repeats.
        tl.fromTo("#tie-1",
          { opacity: 0, transformOrigin: "960px 540px",
            attr: { transform: "translate(960 540) scale(0.15)" } },
          { opacity: 1, duration: 0.6, ease: "power2.out", overwrite: "auto" }, 2.5);
        // Scale the TIE — animate the SVG transform attr in steps so the pursuit reads as approach.
        tl.to("#tie-1",
          { attr: { transform: "translate(960 540) scale(0.30)" },
            duration: 1.5, ease: "power1.in", overwrite: "auto" }, 3.1);
        tl.to("#tie-1",
          { attr: { transform: "translate(990 540) scale(0.45)" },
            duration: 0.8, ease: "power1.inOut" }, 4.0);
        tl.to("#tie-1",
          { attr: { transform: "translate(930 540) scale(0.60)" },
            duration: 0.7, ease: "power1.inOut" }, 4.8);
        // Fade out as we close on the exhaust port
        tl.to("#tie-1", { opacity: 0, duration: 0.4, ease: "power2.in" }, 6.2);
        tl.set("#tie-1", { opacity: 0 }, 6.6);
        tl.set("#tie-2", { opacity: 0 }, 6.7);
        // TIE engine pulse (finite, per-element)
        tl.fromTo("#tie-1 .tie-glow",
          { opacity: 0.55 },
          { opacity: 1, duration: 0.5, ease: "sine.inOut", yoyo: true, repeat: 7 }, 2.5);

        // TIE FIGHTER 2 — appears at t=5 in upper-right, smaller scale.
        tl.set("#tie-2", { opacity: 0,
          attr: { transform: "translate(1320 360) scale(0.22)" } }, 0);
        tl.to("#tie-2", { opacity: 0.95, duration: 0.4, ease: "power2.out" }, 5.0);
        tl.to("#tie-2",
          { attr: { transform: "translate(1380 380) scale(0.30)" },
            duration: 0.9, ease: "power1.inOut" }, 5.0);
        tl.to("#tie-2",
          { attr: { transform: "translate(1280 350) scale(0.30)" },
            duration: 0.6, ease: "sine.inOut" }, 5.9);
        tl.to("#tie-2", { opacity: 0, duration: 0.4, ease: "power2.in" }, 6.3);
        tl.fromTo("#tie-2 .tie-glow",
          { opacity: 0.55 },
          { opacity: 1, duration: 0.4, ease: "sine.inOut", yoyo: true, repeat: 3 }, 5.0);

        // EXHAUST PORT — fades in at t=5.5 dead center, red glow ramps up.
        tl.fromTo("#trench-exhaust",
          { opacity: 0 },
          { opacity: 1, duration: 0.5, ease: "power2.out" }, 5.5);
        tl.fromTo("#trench-exhaust-glow",
          { opacity: 0 },
          { opacity: 0.85, duration: 1.0, ease: "power2.in" }, 5.5);
        // Exhaust glow pulse — finite, marks "lock"
        tl.fromTo("#trench-exhaust-hole",
          { opacity: 1 },
          { opacity: 0.6, duration: 0.25, ease: "sine.inOut", yoyo: true, repeat: 3 }, 6.0);

        // TARGET LOCK ACQUIRED — appears at t=5.5, blinks (finite).
        tl.fromTo("#hud-lock",
          { opacity: 0 },
          { opacity: 1, duration: 0.25, ease: "power2.out" }, 5.5);
        tl.fromTo("#hud-lock",
          { opacity: 1 },
          { opacity: 0.25, duration: 0.18, ease: "sine.inOut", yoyo: true, repeat: 9 }, 5.8);

        // LASERS — 4 streaks, each layered halo+bolt+core
        const lasers = [
          { id: "#laser-1", from: { x: -800, y: -140, rotation: 12  }, to: { x: 0, y: 0, rotation: 12  }, delay: 2.2 },
          { id: "#laser-2", from: { x:  900, y:  120, rotation: -10 }, to: { x: 0, y: 0, rotation: -10 }, delay: 2.6 },
          { id: "#laser-3", from: { x: -700, y:  160, rotation: -8  }, to: { x: 0, y: 0, rotation: -8  }, delay: 3.4 },
          { id: "#laser-4", from: { x:  820, y: -100, rotation: 14  }, to: { x: 0, y: 0, rotation: 14  }, delay: 4.2 }
        ];
        for (const L of lasers) {
          tl.set(L.id, { opacity: 0, scale: 0.7, ...L.from }, 0);
          tl.to(L.id, { ...L.to, opacity: 1, scale: 1.2, duration: 0.18, ease: "power2.out" }, L.delay);
          tl.to(L.id, { opacity: 0, scale: 0.6, duration: 0.22, ease: "power2.in" }, L.delay + 0.18);
        }

        // CAMERA SHAKE — at each laser hit (delay + 0.18 = impact moment), jolt the camera
        // wrapper. translate xy with finite-repeat yoyo — short, sharp, then settled.
        const shakeOffsets = [
          { x:  6, y: -4 },
          { x: -5, y:  5 },
          { x:  4, y:  6 },
          { x: -6, y: -3 }
        ];
        tl.set("#trench-camera", { x: 0, y: 0 }, 0);
        tl.set("#trench-cockpit-shadow", { opacity: 0, x: 0, y: 0 }, 0);
        lasers.forEach(function (L, idx) {
          const hit = L.delay + 0.16;
          const off = shakeOffsets[idx];
          tl.to("#trench-camera",
            { x: off.x, y: off.y, duration: 0.07, ease: "power2.out", overwrite: "auto" }, hit);
          tl.to("#trench-camera",
            { x: -off.x * 0.6, y: -off.y * 0.6, duration: 0.08, ease: "sine.inOut", overwrite: "auto" }, hit + 0.07);
          tl.to("#trench-camera",
            { x: 0, y: 0, duration: 0.15, ease: "power2.out", overwrite: "auto" }, hit + 0.15);

          // Chromatic-shadow cockpit duplicate flickers in red on each hit, fades quickly.
          tl.to("#trench-cockpit-shadow",
            { opacity: 0.55, x: -3, y: 2, duration: 0.06, ease: "power2.out", overwrite: "auto" }, hit);
          tl.to("#trench-cockpit-shadow",
            { opacity: 0, x: 0, y: 0, duration: 0.18, ease: "power2.in", overwrite: "auto" }, hit + 0.08);
        });

        // Final beat: hard white flash as the proton torpedo strikes home
        tl.fromTo("#trench-flash",
          { opacity: 0 },
          { opacity: 0.98, duration: 0.18, ease: "power2.out" }, 6.6);
        tl.to("#trench-flash", { opacity: 0, duration: 0.7, ease: "power2.in" }, 6.8);

        // EXPLOSION BLOOM — banded radial ramp from 0 to 6x scale starting at t=6.7
        tl.fromTo("#trench-bloom",
          { opacity: 0, scale: 0, transformOrigin: "50% 50%" },
          { opacity: 1, scale: 6, duration: 0.8, ease: "power2.out", overwrite: "auto" }, 6.7);
        tl.to("#trench-bloom",
          { opacity: 0, duration: 0.7, ease: "power2.in", overwrite: "auto" }, 7.5);

        window.__timelines["scene-trench"] = tl;
      })();
    </script>
  </div>
</template>
