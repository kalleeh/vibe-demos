<template id="scene-title-template">
  <div data-composition-id="scene-title" data-width="1920" data-height="1080"
       style="position:relative;width:100%;height:100%;overflow:hidden;
              background: radial-gradient(ellipse at 50% 50%, #1a1f2e 0%, #0a0a14 35%, #050508 65%, #000000 100%);">

    <!-- Explosion residue bloom (carry-over from trench scene) -->
    <div id="title-bloom" class="clip" data-start="0" data-duration="0.7" data-track-index="0"
         data-layout-allow-overflow
         style="position:absolute;left:50%;top:50%;width:1600px;height:1600px;
                transform:translate(-50%,-50%) scale(1.5);transform-origin:50% 50%;
                opacity:0.4;pointer-events:none;mix-blend-mode:screen;
                background: radial-gradient(circle at 50% 50%,
                  rgba(255,220,140,0.95) 0%,
                  rgba(255,179,71,0.75) 18%,
                  rgba(255,120,40,0.45) 36%,
                  rgba(180,60,20,0.20) 58%,
                  rgba(0,0,0,0) 78%);"></div>

    <!-- Cosmic clouds (galactic backdrop) -->
    <svg id="title-clouds" class="clip" data-start="0" data-duration="2" data-track-index="1"
         viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice"
         data-layout-allow-overflow
         style="position:absolute;inset:0;width:100%;height:100%;filter:blur(60px);opacity:0.55;
                transform-origin:50% 50%;">
      <defs>
        <radialGradient id="cloud-a" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#4BD5EE" stop-opacity="0.55"/>
          <stop offset="40%" stop-color="#5B6BC8" stop-opacity="0.30"/>
          <stop offset="75%" stop-color="#8A4FB0" stop-opacity="0.12"/>
          <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="cloud-b" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#C84FB0" stop-opacity="0.45"/>
          <stop offset="45%" stop-color="#7A3F9C" stop-opacity="0.22"/>
          <stop offset="80%" stop-color="#3A2A5C" stop-opacity="0.08"/>
          <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="cloud-c" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#E83FA0" stop-opacity="0.50"/>
          <stop offset="40%" stop-color="#9B2D78" stop-opacity="0.25"/>
          <stop offset="80%" stop-color="#3D1240" stop-opacity="0.08"/>
          <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <ellipse cx="520" cy="380" rx="620" ry="340" fill="url(#cloud-a)"/>
      <ellipse cx="1480" cy="760" rx="540" ry="300" fill="url(#cloud-b)"/>
      <ellipse cx="960" cy="540" rx="480" ry="260" fill="url(#cloud-c)"/>
    </svg>

    <!-- Starfield with cross-flares -->
    <svg id="title-stars" class="clip" data-start="0" data-duration="2" data-track-index="2"
         viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice"
         style="position:absolute;inset:0;width:100%;height:100%;"></svg>

    <!-- Particle debris drift -->
    <svg id="title-debris" class="clip" data-start="0" data-duration="1.05" data-track-index="3"
         viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice"
         data-layout-allow-overflow
         style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;"></svg>

    <!-- 12-spoke yellow burst behind title -->
    <svg id="title-burst" class="clip" data-start="0" data-duration="2" data-track-index="4"
         viewBox="-700 -700 1400 1400" preserveAspectRatio="xMidYMid meet"
         data-layout-allow-overflow
         style="position:absolute;left:50%;top:50%;width:1400px;height:1400px;
                transform:translate(-50%,-50%) scale(0);transform-origin:50% 50%;
                opacity:0;pointer-events:none;"></svg>

    <!-- 8-spoke white-hot twin burst -->
    <svg id="title-burst2" class="clip" data-start="0" data-duration="2" data-track-index="5"
         viewBox="-700 -700 1400 1400" preserveAspectRatio="xMidYMid meet"
         data-layout-allow-overflow
         style="position:absolute;left:50%;top:50%;width:1400px;height:1400px;
                transform:translate(-50%,-50%) rotate(22.5deg) scale(0);transform-origin:50% 50%;
                opacity:0;pointer-events:none;mix-blend-mode:screen;"></svg>

    <!-- Anamorphic horizontal flare -->
    <div id="title-anamorphic" class="clip" data-start="0.4" data-duration="0.85" data-track-index="6"
         data-layout-allow-overflow
         style="position:absolute;left:50%;top:50%;width:2000px;height:8px;
                transform:translate(-50%,-50%);transform-origin:50% 50%;
                background:#FFFFFF;filter:blur(28px);opacity:0;
                mix-blend-mode:screen;pointer-events:none;"></div>

    <!-- Camera-push wrapper (slow scale 1.0 -> 1.06 lives here) -->
    <div id="title-camera" class="clip" data-start="0" data-duration="2" data-track-index="7"
         data-layout-allow-overflow
         style="position:absolute;inset:0;transform-origin:50% 50%;">

      <!-- Logo glow pulse layer (duplicate of headline for added presence) -->
      <div id="title-glow-pulse" data-layout-allow-overflow
           style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
                  text-align:center;font-family:'Star Jedi','Times New Roman',serif;
                  color:#FFE81F;opacity:0;transform-origin:50% 50%;pointer-events:none;
                  mix-blend-mode:screen;">
        <div style="font-size:140px;letter-spacing:0.06em;line-height:1;text-transform:lowercase;
                    filter: drop-shadow(0 0 36px #FFE81F) drop-shadow(0 0 12px #FFD27A);">A NEW HOPE</div>
      </div>

      <!-- Main title block -->
      <div id="title-block" data-layout-allow-overflow
           style="position:absolute;inset:0;display:flex;flex-direction:column;
                  align-items:center;justify-content:center;text-align:center;
                  font-family:'Star Jedi','Times New Roman',serif;color:#FFE81F;
                  opacity:0;transform-origin:50% 50%;">
        <div style="font-size:42px;letter-spacing:0.32em;margin-bottom:0.7em;text-transform:lowercase;
                    filter: drop-shadow(0 0 12px #FFE81F) drop-shadow(0 0 4px #FFE81F);">EPISODE IV</div>
        <div id="title-headline"
             style="font-size:140px;letter-spacing:0.06em;line-height:1;text-transform:lowercase;
                    filter: drop-shadow(0 0 24px #FFE81F) drop-shadow(0 0 8px #FFE81F);">A NEW HOPE</div>
        <div id="title-subtitle"
             style="font-family:'Helvetica Neue','Arial',sans-serif;color:#9FE9FF;
                    font-size:22px;letter-spacing:0.4em;margin-top:1.4em;text-transform:uppercase;
                    opacity:0;">A vibe-demos homage</div>
      </div>
    </div>

    <!-- Final black overlay (punctuates end of scene) -->
    <div id="title-blackout" class="clip" data-start="1.7" data-duration="0.3" data-track-index="8"
         data-layout-allow-overflow
         style="position:absolute;inset:0;background:#000000;opacity:0;pointer-events:none;"></div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        function mulberry32(seed) {
          return function () {
            let t = (seed += 0x6d2b79f5);
            t = Math.imul(t ^ (t >>> 15), t | 1);
            t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
            return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
          };
        }
        const rnd = mulberry32(0xdeadbeef);
        const ns = "http://www.w3.org/2000/svg";

        // Build starfield: ~150 stars, ranked by brightness; brightest 20 get cross flares.
        const svgStars = document.getElementById("title-stars");
        const stars = [];
        for (let i = 0; i < 150; i++) {
          const r = rnd();
          stars.push({
            x: rnd() * 1920,
            y: rnd() * 1080,
            r: 0.5 + r * 1.4,
            o: 0.35 + r * 0.55,
            b: r // brightness rank
          });
        }
        // Sort by brightness desc; top 20 get flares.
        const ranked = stars.slice().sort((a, b) => b.b - a.b);
        const flareSet = new Set(ranked.slice(0, 20));
        // Track twinkle nodes (the 20 flare cores) so we can animate them.
        const twinkleNodes = [];
        const twinkleDurations = [];

        for (const s of stars) {
          if (flareSet.has(s)) {
            // 4-point cross flare: a group with two thin crossed rects + a core dot.
            const g = document.createElementNS(ns, "g");
            g.setAttribute("transform", `translate(${s.x.toFixed(1)} ${s.y.toFixed(1)})`);
            g.setAttribute("class", "title-twinkle");
            const len = 14 + s.b * 18;
            const thick = 0.9;
            const r1 = document.createElementNS(ns, "rect");
            r1.setAttribute("x", (-len / 2).toFixed(2));
            r1.setAttribute("y", (-thick / 2).toFixed(2));
            r1.setAttribute("width", len.toFixed(2));
            r1.setAttribute("height", thick.toFixed(2));
            r1.setAttribute("fill", "#F5F5F5");
            r1.setAttribute("opacity", "0.9");
            g.appendChild(r1);
            const r2 = document.createElementNS(ns, "rect");
            r2.setAttribute("x", (-thick / 2).toFixed(2));
            r2.setAttribute("y", (-len / 2).toFixed(2));
            r2.setAttribute("width", thick.toFixed(2));
            r2.setAttribute("height", len.toFixed(2));
            r2.setAttribute("fill", "#F5F5F5");
            r2.setAttribute("opacity", "0.9");
            g.appendChild(r2);
            const core = document.createElementNS(ns, "circle");
            core.setAttribute("cx", "0");
            core.setAttribute("cy", "0");
            core.setAttribute("r", (s.r + 0.4).toFixed(2));
            core.setAttribute("fill", "#F5F5F5");
            core.setAttribute("opacity", "0.95");
            g.appendChild(core);
            svgStars.appendChild(g);
            twinkleNodes.push(g);
            // Duration 0.4 - 1.2s, seeded
            twinkleDurations.push(0.4 + rnd() * 0.8);
          } else {
            const c = document.createElementNS(ns, "circle");
            c.setAttribute("cx", s.x.toFixed(1));
            c.setAttribute("cy", s.y.toFixed(1));
            c.setAttribute("r", s.r.toFixed(2));
            c.setAttribute("fill", "#F5F5F5");
            c.setAttribute("opacity", s.o.toFixed(2));
            svgStars.appendChild(c);
          }
        }

        // Particle debris: 16 small bright circles drifting outward from center.
        const svgDebris = document.getElementById("title-debris");
        const debrisNodes = [];
        const debrisData = [];
        const debrisColors = ["#FFFFFF", "#FFE81F", "#FFB347", "#FFD27A"];
        const N_DEBRIS = 16;
        for (let i = 0; i < N_DEBRIS; i++) {
          const ang = (i / N_DEBRIS) * Math.PI * 2 + rnd() * 0.3;
          const speed = 380 + rnd() * 460;
          const radius = 1 + rnd() * 2; // 1-3px
          const color = debrisColors[Math.floor(rnd() * debrisColors.length) % debrisColors.length];
          const c = document.createElementNS(ns, "circle");
          c.setAttribute("cx", "960");
          c.setAttribute("cy", "540");
          c.setAttribute("r", radius.toFixed(2));
          c.setAttribute("fill", color);
          c.setAttribute("opacity", "0");
          svgDebris.appendChild(c);
          debrisNodes.push(c);
          debrisData.push({
            dx: Math.cos(ang) * speed,
            dy: Math.sin(ang) * speed
          });
        }

        // 12-spoke yellow burst behind title.
        const svgBurst = document.getElementById("title-burst");
        const spokeLen = 640;
        const spokeHalf = 18;
        for (let k = 0; k < 12; k++) {
          const ang = (k * Math.PI * 2) / 12;
          const cos = Math.cos(ang), sin = Math.sin(ang);
          const pts = [
            [spokeLen, 0],
            [40, spokeHalf],
            [0, 0],
            [40, -spokeHalf]
          ].map(([px, py]) => {
            const rx = px * cos - py * sin;
            const ry = px * sin + py * cos;
            return rx.toFixed(1) + "," + ry.toFixed(1);
          }).join(" ");
          const poly = document.createElementNS(ns, "polygon");
          poly.setAttribute("points", pts);
          poly.setAttribute("fill", "#FFE81F");
          poly.setAttribute("opacity", "0.7");
          svgBurst.appendChild(poly);
        }

        // 8-spoke white-hot twin burst (rotated 22.5deg via container).
        const svgBurst2 = document.getElementById("title-burst2");
        const spokeLen2 = 560;
        const spokeHalf2 = 12;
        for (let k = 0; k < 8; k++) {
          const ang = (k * Math.PI * 2) / 8;
          const cos = Math.cos(ang), sin = Math.sin(ang);
          const pts = [
            [spokeLen2, 0],
            [32, spokeHalf2],
            [0, 0],
            [32, -spokeHalf2]
          ].map(([px, py]) => {
            const rx = px * cos - py * sin;
            const ry = px * sin + py * cos;
            return rx.toFixed(1) + "," + ry.toFixed(1);
          }).join(" ");
          const poly = document.createElementNS(ns, "polygon");
          poly.setAttribute("points", pts);
          poly.setAttribute("fill", "#FFFFFF");
          poly.setAttribute("opacity", "0.85");
          svgBurst2.appendChild(poly);
        }

        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // ---- Bloom residue: dissipates over first 0.6s ----
        tl.fromTo("#title-bloom",
          { opacity: 0.4, scale: 1.5 },
          { opacity: 0, scale: 2.0, duration: 0.6, ease: "power2.out" }, 0);

        // ---- Cosmic clouds: gentle fade-in + very slow rotation ----
        tl.fromTo("#title-clouds", { opacity: 0 }, { opacity: 0.55, duration: 0.8, ease: "power2.out" }, 0);
        tl.fromTo("#title-clouds", { rotation: 0 }, { rotation: 360, duration: 2, ease: "none", transformOrigin: "50% 50%" }, 0);

        // ---- Stars fade in + parallax drift ----
        tl.fromTo("#title-stars", { opacity: 0 }, { opacity: 1, duration: 0.6, ease: "power2.out" }, 0);
        tl.to("#title-stars", { x: -30, duration: 2, ease: "none" }, 0);
        tl.to("#title-clouds", { x: -18, duration: 2, ease: "none" }, 0);

        // ---- Twinkle the brightest 20 stars (finite yoyo within 2s window) ----
        for (let i = 0; i < twinkleNodes.length; i++) {
          const dur = twinkleDurations[i];
          // How many full yoyo cycles fit before t=2s? cap repeats so total stays finite.
          const startAt = rnd() * 0.4; // small offset so they don't sync
          const remaining = 2 - startAt;
          // each yoyo unit = 2*dur (forward + back); pick repeat count so total <= remaining
          const cycleLen = dur * 2;
          let repeats = Math.max(0, Math.floor(remaining / cycleLen) - 1);
          if (repeats > 4) repeats = 4; // safety cap
          tl.to(twinkleNodes[i], {
            opacity: 0.25,
            duration: dur,
            ease: "sine.inOut",
            yoyo: true,
            repeat: repeats
          }, startAt);
        }

        // ---- Debris drift outward, fading by t=1s ----
        for (let i = 0; i < debrisNodes.length; i++) {
          const d = debrisData[i];
          // Quick fade-in then drift + fade out
          tl.fromTo(debrisNodes[i],
            { opacity: 0, x: 0, y: 0 },
            { opacity: 0.95, duration: 0.12, ease: "power2.out" }, 0);
          tl.to(debrisNodes[i],
            { x: d.dx, y: d.dy, duration: 1.0, ease: "power2.out" }, 0);
          tl.to(debrisNodes[i],
            { opacity: 0, duration: 0.55, ease: "power2.in" }, 0.45);
        }

        // ---- Title rises from below, fades in (camera owns scale) ----
        tl.fromTo("#title-block",
          { opacity: 0, y: 40 },
          { opacity: 1, y: 0, duration: 0.9, ease: "power3.out" }, 0.1);

        // ---- Headline subtle scale-in feels regal ----
        tl.fromTo("#title-headline",
          { letterSpacing: "0.18em", scale: 0.96, transformOrigin: "50% 50%" },
          { letterSpacing: "0.06em", scale: 1.0, duration: 1.0, ease: "power2.out" }, 0.1);

        // ---- Subtitle delayed reveal at t=0.7s with letter-spacing tween ----
        tl.fromTo("#title-subtitle",
          { opacity: 0, letterSpacing: "0.4em" },
          { opacity: 0.7, letterSpacing: "0.32em", duration: 0.7, ease: "power2.out" }, 0.7);

        // ---- 12-spoke yellow burst: bigger, brighter peak 0.7 ----
        tl.fromTo("#title-burst",
          { scale: 0, opacity: 0 },
          { scale: 1.5, opacity: 0.7, duration: 0.42, ease: "power2.out" }, 0.15);
        tl.to("#title-burst", { opacity: 0, duration: 0.5, ease: "power2.in" }, 0.6);

        // ---- 8-spoke white-hot twin burst, 0.2s later, slightly smaller ----
        tl.fromTo("#title-burst2",
          { scale: 0, opacity: 0, rotation: 22.5 },
          { scale: 1.3, opacity: 0.85, duration: 0.42, ease: "power2.out" }, 0.35);
        tl.to("#title-burst2", { opacity: 0, duration: 0.55, ease: "power2.in" }, 0.78);

        // ---- Anamorphic horizontal flare across logo at t=0.4s ----
        tl.fromTo("#title-anamorphic",
          { opacity: 0, scaleY: 1 },
          { opacity: 0.65, duration: 0.32, ease: "power2.out" }, 0.4);
        tl.to("#title-anamorphic",
          { opacity: 0, duration: 0.48, ease: "power2.in" }, 0.72);

        // ---- Logo glow pulse (duplicate, scales 1.0 -> 1.04 -> 1.0, opacity yoyo) ----
        tl.fromTo("#title-glow-pulse",
          { opacity: 0, scale: 1.0 },
          { opacity: 0.55, scale: 1.04, duration: 0.4, ease: "power2.out" }, 0.3);
        tl.to("#title-glow-pulse",
          { opacity: 0.25, scale: 1.0, duration: 0.4, ease: "power2.inOut" }, 0.7);

        // ---- Slow camera push 1.0 -> 1.06 over 2s ----
        tl.fromTo("#title-camera",
          { scale: 1.0 },
          { scale: 1.06, duration: 2.0, ease: "none" }, 0);

        // ---- Final fade-out (exits allowed only in this scene) ----
        tl.to("#title-block", { opacity: 0, duration: 0.5, ease: "power2.in" }, 1.5);
        tl.to("#title-stars", { opacity: 0, duration: 0.5, ease: "power2.in" }, 1.5);
        tl.to("#title-clouds", { opacity: 0, duration: 0.5, ease: "power2.in" }, 1.5);
        tl.to("#title-glow-pulse", { opacity: 0, duration: 0.5, ease: "power2.in" }, 1.5);

        // ---- Blackout overlay punctuates the very end ----
        tl.fromTo("#title-blackout",
          { opacity: 0 },
          { opacity: 1.0, duration: 0.3, ease: "power2.in" }, 1.7);

        window.__timelines["scene-title"] = tl;
      })();
    </script>
  </div>
</template>
