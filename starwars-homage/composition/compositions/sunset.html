<template id="scene-sunset-template">
  <div data-composition-id="scene-sunset" data-width="1920" data-height="1080"
       style="position:relative;width:100%;height:100%;overflow:hidden;background:#1a0a0e;">

    <!-- =========================================================
         GRADE WRAPPER — entire scene's color grading shifts over 8s.
         Wraps the whole composition so a single filter tween covers
         every layer beneath. Itself NOT a clip; its children are.
         ========================================================= -->
    <div id="sunset-grade"
         style="position:absolute;inset:0;width:100%;height:100%;
                filter:brightness(1.0) saturate(1.0);">

    <!-- =========================================================
         CAMERA WRAPPER — slow push-in (scale 1.0 -> 1.03 over 8s).
         Contains every background and foreground layer so the push
         feels like a true camera move. Not a clip itself; children
         carry the clip metadata.
         ========================================================= -->
    <div id="sunset-camera"
         data-layout-allow-overflow
         style="position:absolute;inset:0;width:100%;height:100%;
                transform-origin:50% 55%;will-change:transform;">

    <!-- =========================================================
         SKY: 5-stop banded painterly gradient (Clone Wars cel)
         ========================================================= -->
    <svg id="sunset-sky" class="clip" data-start="0" data-duration="8" data-track-index="0"
         viewBox="0 0 1920 1080" preserveAspectRatio="none"
         style="position:absolute;inset:0;width:100%;height:100%;">
      <defs>
        <!-- Warm-only banded sky (top→bottom). Paired stops at 49/50% pairs
             posterize the gradient into cel-paint bands matching the project's
             sketchbook visual vocabulary. Zero blue anywhere. -->
        <linearGradient id="sky-band" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#3A1B5A"/>
          <stop offset="24%"  stop-color="#3A1B5A"/>
          <stop offset="25%"  stop-color="#4D2466"/>
          <stop offset="44%"  stop-color="#7A3F8C"/>
          <stop offset="45%"  stop-color="#9A4A88"/>
          <stop offset="62%"  stop-color="#E55C8A"/>
          <stop offset="63%"  stop-color="#F07A78"/>
          <stop offset="80%"  stop-color="#FF9560"/>
          <stop offset="81%"  stop-color="#FFB347"/>
          <stop offset="100%" stop-color="#FFC470"/>
        </linearGradient>
        <!-- Faint film-grain banding overlay (warm-only) -->
        <linearGradient id="sky-film" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#000000" stop-opacity="0.18"/>
          <stop offset="40%"  stop-color="#000000" stop-opacity="0"/>
          <stop offset="60%"  stop-color="#FFD27A" stop-opacity="0"/>
          <stop offset="100%" stop-color="#FFB347" stop-opacity="0.08"/>
        </linearGradient>
      </defs>
      <rect x="0" y="0" width="1920" height="1080" fill="url(#sky-band)"/>
      <rect x="0" y="0" width="1920" height="1080" fill="url(#sky-film)"/>
    </svg>

    <!-- =========================================================
         CLOUD BANDS — 5 stretched painterly ellipses in the upper
         60% of frame, blurred for soft-painted look. Drift slowly
         horizontally over 8s.
         ========================================================= -->
    <svg id="sunset-clouds" class="clip" data-start="0" data-duration="8" data-track-index="2"
         viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice"
         data-layout-allow-overflow
         style="position:absolute;inset:0;width:100%;height:100%;
                filter:blur(30px);mix-blend-mode:screen;pointer-events:none;">
      <defs>
        <!-- Apricot cloud — bright midband -->
        <linearGradient id="cloud-apricot" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"  stop-color="#FFB347" stop-opacity="0"/>
          <stop offset="40%" stop-color="#FFD27A" stop-opacity="0.55"/>
          <stop offset="60%" stop-color="#FFD27A" stop-opacity="0.55"/>
          <stop offset="100%" stop-color="#FFB347" stop-opacity="0"/>
        </linearGradient>
        <!-- Vermilion cloud — hotter, lower in sky -->
        <linearGradient id="cloud-vermilion" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"   stop-color="#c45627" stop-opacity="0"/>
          <stop offset="50%"  stop-color="#d96930" stop-opacity="0.50"/>
          <stop offset="100%" stop-color="#c45627" stop-opacity="0"/>
        </linearGradient>
        <!-- Magenta cloud — high band -->
        <linearGradient id="cloud-plum" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"   stop-color="#7A3F8C" stop-opacity="0"/>
          <stop offset="50%"  stop-color="#9A4A88" stop-opacity="0.40"/>
          <stop offset="100%" stop-color="#7A3F8C" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <!-- Highest, deep plum band -->
      <ellipse class="cloud-band" cx="700"  cy="170" rx="520" ry="22"
               fill="url(#cloud-plum)" data-layout-allow-overflow/>
      <!-- Vermilion band, mid-upper -->
      <ellipse class="cloud-band" cx="1280" cy="290" rx="640" ry="28"
               fill="url(#cloud-vermilion)" data-layout-allow-overflow/>
      <!-- Apricot band, slightly above suns -->
      <ellipse class="cloud-band" cx="500"  cy="430" rx="580" ry="24"
               fill="url(#cloud-apricot)" data-layout-allow-overflow/>
      <!-- Apricot band, high-bright streak -->
      <ellipse class="cloud-band" cx="1500" cy="500" rx="540" ry="20"
               fill="url(#cloud-apricot)" data-layout-allow-overflow/>
      <!-- Vermilion band, just above horizon -->
      <ellipse class="cloud-band" cx="900"  cy="580" rx="700" ry="18"
               fill="url(#cloud-vermilion)" data-layout-allow-overflow/>
    </svg>

    <!-- =========================================================
         WIND DUST: 5 thin streaks drifting across the dune line
         ========================================================= -->
    <svg id="sunset-dust" class="clip" data-start="0" data-duration="8" data-track-index="3"
         viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice"
         style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;">
      <g fill="none" stroke="#FFB347" stroke-linecap="round" opacity="0.30">
        <path class="dust-streak" d="M 200,720 Q 360,716 520,722"  stroke-width="1.2"/>
        <path class="dust-streak" d="M 760,742 Q 920,738 1080,744" stroke-width="1.0"/>
        <path class="dust-streak" d="M 1280,712 Q 1440,708 1600,716" stroke-width="1.4"/>
        <path class="dust-streak" d="M 420,760 Q 580,756 740,762"  stroke-width="0.9"/>
        <path class="dust-streak" d="M 1080,778 Q 1240,774 1400,780" stroke-width="1.1"/>
      </g>
    </svg>

    <!-- =========================================================
         SUN GLOW HALOS (CSS-blurred SVG circles, behind suns)
         ========================================================= -->
    <svg id="sunset-glows" class="clip" data-start="0" data-duration="8" data-track-index="4"
         viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice"
         data-layout-allow-overflow
         style="position:absolute;inset:0;width:100%;height:100%;filter:blur(40px);mix-blend-mode:screen;">
      <defs>
        <radialGradient id="halo-a" cx="50%" cy="50%" r="50%">
          <stop offset="0%"  stop-color="#FFE8A8" stop-opacity="0.85"/>
          <stop offset="60%" stop-color="#FFB347" stop-opacity="0.40"/>
          <stop offset="100%" stop-color="#FFB347" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="halo-b" cx="50%" cy="50%" r="50%">
          <stop offset="0%"  stop-color="#FF8A4C" stop-opacity="0.70"/>
          <stop offset="100%" stop-color="#E55C3A" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <circle id="sun-glow-a" cx="900"  cy="640" r="320" fill="url(#halo-a)" data-layout-allow-overflow/>
      <circle id="sun-glow-b" cx="1280" cy="700" r="220" fill="url(#halo-b)" data-layout-allow-overflow/>
    </svg>

    <!-- =========================================================
         SUN CORONA — a 6-spoke burst behind the larger sun, very
         faint, slowly rotates over 8s.
         ========================================================= -->
    <svg id="sunset-corona" class="clip" data-start="0" data-duration="8" data-track-index="5"
         viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice"
         data-layout-allow-overflow
         style="position:absolute;inset:0;width:100%;height:100%;
                mix-blend-mode:screen;pointer-events:none;">
      <defs>
        <linearGradient id="corona-spoke" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#FFE6C0" stop-opacity="0"/>
          <stop offset="50%"  stop-color="#FFD27A" stop-opacity="0.18"/>
          <stop offset="100%" stop-color="#FFB347" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <!-- Group anchored at primary sun (cx=900, cy=640). Six spokes
           radiate outward; rotation transform is animated on this group. -->
      <g id="sunset-corona-spokes" transform="translate(900 640) rotate(0)" filter="blur(8px)">
        <!-- Each spoke: tall thin rect drawn from -540..+540 vertically,
             rotated in 60deg increments so they form a 6-spoke star. -->
        <rect x="-22" y="-540" width="44" height="1080" fill="url(#corona-spoke)" transform="rotate(0)"/>
        <rect x="-22" y="-540" width="44" height="1080" fill="url(#corona-spoke)" transform="rotate(60)"/>
        <rect x="-22" y="-540" width="44" height="1080" fill="url(#corona-spoke)" transform="rotate(120)"/>
        <rect x="-22" y="-540" width="44" height="1080" fill="url(#corona-spoke)" transform="rotate(30)"/>
        <rect x="-22" y="-540" width="44" height="1080" fill="url(#corona-spoke)" transform="rotate(90)"/>
        <rect x="-22" y="-540" width="44" height="1080" fill="url(#corona-spoke)" transform="rotate(150)"/>
      </g>
    </svg>

    <!-- =========================================================
         TWIN SUNS (hard-stop cel discs)
         ========================================================= -->
    <svg id="sunset-suns" class="clip" data-start="0" data-duration="8" data-track-index="6"
         viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice"
         data-layout-allow-overflow
         style="position:absolute;inset:0;width:100%;height:100%;">
      <defs>
        <!-- Primary: cream-yellow cel disc with hard core/halo edge. -->
        <radialGradient id="sun-a" cx="50%" cy="50%" r="50%">
          <stop offset="0%"   stop-color="#FFE8A8"/>
          <stop offset="60%"  stop-color="#FFE8A8"/>
          <stop offset="61%"  stop-color="#FFB347"/>
          <stop offset="90%"  stop-color="#FFB347" stop-opacity="0.55"/>
          <stop offset="100%" stop-color="#FFB347" stop-opacity="0"/>
        </radialGradient>
        <!-- Secondary: red-orange cel disc, visibly hotter than primary. -->
        <radialGradient id="sun-b" cx="50%" cy="50%" r="50%">
          <stop offset="0%"   stop-color="#FF8A4C"/>
          <stop offset="62%"  stop-color="#FF8A4C"/>
          <stop offset="63%"  stop-color="#E55C3A"/>
          <stop offset="90%"  stop-color="#E55C3A" stop-opacity="0.55"/>
          <stop offset="100%" stop-color="#E55C3A" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <!-- Smaller red-orange companion sun, lower-right of primary, ~1.5x primary diameter away -->
      <circle id="sun-b-disc" cx="1280" cy="700" r="80"  fill="url(#sun-b)" data-layout-allow-overflow/>
      <!-- Primary cream-yellow sun, upper-left -->
      <circle id="sun-a-disc" cx="900"  cy="640" r="120" fill="url(#sun-a)" data-layout-allow-overflow/>
    </svg>

    <!-- =========================================================
         SUN-LOCAL HEAT SHIMMER — small ellipse around the suns,
         breathes faster (yoyo every 0.6s, finite repeat).
         ========================================================= -->
    <div id="sunset-sun-shimmer" class="clip" data-start="0" data-duration="8" data-track-index="7"
         data-layout-allow-overflow
         style="position:absolute;left:42%;top:56%;width:28%;height:10%;
                background:radial-gradient(ellipse at 50% 50%,
                  rgba(255,232,168,0.30) 0%,
                  rgba(255,180,90,0.16) 55%,
                  rgba(229,92,58,0) 100%);
                filter:blur(4px);mix-blend-mode:screen;opacity:0.7;
                pointer-events:none;"></div>

    <!-- =========================================================
         HEAT HAZE band over horizon (kept; tightened timing)
         ========================================================= -->
    <div id="sunset-haze" class="clip" data-start="0" data-duration="8" data-track-index="8"
         style="position:absolute;left:0;right:0;top:62%;height:14%;
                background:radial-gradient(ellipse at 50% 50%,
                  rgba(255,210,140,0.50) 0%,
                  rgba(255,180,90,0.20) 50%,
                  rgba(255,180,90,0) 100%);
                filter:blur(6px);mix-blend-mode:screen;opacity:0.85;"></div>

    <!-- =========================================================
         DUNES: 5 layers w/ atmospheric perspective. Back-to-front
         desaturate/lighten reverses (back warmest/lightest, front
         near-black). Each has a 2-3px warm rim on its top edge.
         Atmospheric haze band sits between back and mid layers.
         ========================================================= -->
    <svg id="sunset-dunes" class="clip" data-start="0" data-duration="8" data-track-index="9"
         viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice"
         style="position:absolute;inset:0;width:100%;height:100%;">
      <defs>
        <!-- Atmospheric haze between the back ridge and mid-back ridge. -->
        <linearGradient id="dune-haze" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#FFD27A" stop-opacity="0"/>
          <stop offset="50%"  stop-color="#FFE6C0" stop-opacity="0.28"/>
          <stop offset="100%" stop-color="#FFB347" stop-opacity="0"/>
        </linearGradient>
      </defs>

      <!-- BACK-FAR dune body (warm beige, most distant) -->
      <path d="M0,752 C220,738 380,768 580,762 C780,756 940,732 1180,740 C1420,748 1620,762 1920,756 L1920,1080 L0,1080 Z"
            fill="#b48464"/>
      <!-- BACK-FAR warm rim -->
      <path d="M0,752 C220,738 380,768 580,762 C780,756 940,732 1180,740 C1420,748 1620,762 1920,756"
            fill="none" stroke="#FFE6C0" stroke-width="2" stroke-linecap="round" opacity="0.85"/>

      <!-- ATMOSPHERIC HAZE band between back-far and back -->
      <rect x="0" y="745" width="1920" height="62" fill="url(#dune-haze)" opacity="0.85"
            style="filter:blur(8px);"/>

      <!-- BACK dune body (tan) -->
      <path d="M0,790 C220,770 380,810 580,800 C780,790 940,762 1180,772 C1420,782 1620,800 1920,792 L1920,1080 L0,1080 Z"
            fill="#8a5a44"/>
      <!-- BACK dune warm rim -->
      <path d="M0,790 C220,770 380,810 580,800 C780,790 940,762 1180,772 C1420,782 1620,800 1920,792"
            fill="none" stroke="#FFB347" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>

      <!-- MID dune body (russet) -->
      <path d="M0,840 C200,818 420,866 660,852 C880,840 1120,810 1360,832 C1580,852 1760,838 1920,842 L1920,1080 L0,1080 Z"
            fill="#6e3a2a"/>
      <!-- MID dune warm rim -->
      <path d="M0,840 C200,818 420,866 660,852 C880,840 1120,810 1360,832 C1580,852 1760,838 1920,842"
            fill="none" stroke="#FFB347" stroke-width="2.5" stroke-linecap="round" opacity="0.78"/>

      <!-- MID-NEAR dune body (dark sienna) -->
      <path d="M0,872 C220,852 460,898 700,886 C940,876 1140,852 1380,870 C1620,888 1800,876 1920,876 L1920,1080 L0,1080 Z"
            fill="#3a1a18"/>
      <!-- MID-NEAR warm rim -->
      <path d="M0,872 C220,852 460,898 700,886 C940,876 1140,852 1380,870 C1620,888 1800,876 1920,876"
            fill="none" stroke="#FFB347" stroke-width="2.5" stroke-linecap="round" opacity="0.70"/>

      <!-- NEAR dune body (near-black) -->
      <path d="M0,902 C260,872 460,932 720,920 C980,910 1180,880 1420,900 C1660,922 1820,910 1920,910 L1920,1080 L0,1080 Z"
            fill="#1f0d10"/>
      <!-- NEAR dune warm rim -->
      <path d="M0,902 C260,872 460,932 720,920 C980,910 1180,880 1420,900 C1660,922 1820,910 1920,910"
            fill="none" stroke="#FFB347" stroke-width="3" stroke-linecap="round" opacity="0.65"/>
      <!-- NEAR dune contour ink (Clone Wars bold silhouette stroke) -->
      <path d="M0,902 C260,872 460,932 720,920 C980,910 1180,880 1420,900 C1660,922 1820,910 1920,910"
            fill="none" stroke="#000000" stroke-width="1.5" stroke-linecap="round" opacity="0.55"/>
    </svg>

    <!-- =========================================================
         FIGURE: Luke as hero shot — larger, more centered, holding
         macrobinoculars to face. Long shadow cast right behind him.
         scale 1.4, anchored at translate(920 820).
         ========================================================= -->
    <svg id="sunset-figure" class="clip" data-start="0" data-duration="8" data-track-index="10"
         viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice"
         data-layout-allow-overflow
         style="position:absolute;inset:0;width:100%;height:100%;">

      <!-- LONG SHADOW — polygon stretching ~200px from his feet at
           ~75deg toward upper-right behind him. Dark, low opacity. -->
      <polygon id="luke-shadow"
               points="900,1000 940,1000 1140,948 1108,944"
               fill="#0a0a0a" opacity="0.55"
               data-layout-allow-overflow/>

      <g transform="translate(920 820) scale(1.4)" data-layout-allow-overflow>
        <!-- Body fill (hooded poncho silhouette).  Arms now raised in
             front to hold macrobinoculars at face height: shoulder
             paths are unchanged but additional arm strokes are drawn
             on top. The lower-body silhouette continues to be the
             single composite path. -->
        <path id="luke-body"
              d="M -10,-44
                 C -22,-44 -28,-32 -26,-22
                 L -30,-6
                 C -34,4 -34,12 -30,18
                 L -40,30
                 C -46,42 -48,58 -44,72
                 L -38,92
                 L -28,108
                 L -22,128
                 L -10,128
                 L -8,104
                 L 8,104
                 L 10,128
                 L 22,128
                 L 28,108
                 L 38,92
                 L 44,72
                 C 48,58 46,42 40,30
                 L 30,18
                 C 34,12 34,4 30,-6
                 L 26,-22
                 C 28,-32 22,-44 10,-44
                 L -10,-44 Z"
              fill="#000000" stroke="#000000" stroke-width="1.5" stroke-linejoin="round"/>

        <!-- ARMS RAISED holding macrobinoculars: two arm strokes
             coming forward from shoulders, meeting at face height.
             Drawn as thick strokes for silhouette consistency. -->
        <path d="M -28,-6 C -22,-12 -14,-22 -8,-30"
              fill="none" stroke="#000000" stroke-width="9"
              stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M  28,-6 C  22,-12  14,-22  8,-30"
              fill="none" stroke="#000000" stroke-width="9"
              stroke-linecap="round" stroke-linejoin="round"/>

        <!-- MACROBINOCULARS — small horizontal rectangle between
             hands at face height. Two cylinders + bridge. -->
        <rect x="-12" y="-36" width="24" height="9" fill="#000000" stroke="#000000" stroke-width="1.2"/>
        <rect x="-13" y="-34" width="3"  height="5" fill="#1a1a1a"/>
        <rect x="10"  y="-34" width="3"  height="5" fill="#1a1a1a"/>
        <!-- Tiny warm catch-light kiss on the front of each barrel -->
        <rect x="-13" y="-33" width="1.5" height="2" fill="#FFD27A" opacity="0.85"/>
        <rect x="11.5" y="-33" width="1.5" height="2" fill="#FFD27A" opacity="0.85"/>

        <!-- Hem ripple — overlaid path morphed via attr d. -->
        <path id="luke-hem"
              d="M -44,72 C -30,76 -14,74 0,76 C 14,78 30,76 44,72 L 46,86 L -46,86 Z"
              fill="#000000"/>

        <!-- Warm rim on the top edge (hood crown + shoulders + arms).
             Cel-style key-light kiss — 1.5px stroke, opacity 0.85. -->
        <path d="M -22,-22
                 C -28,-32 -22,-44 -10,-44
                 L 10,-44
                 C 22,-44 28,-32 22,-22"
              fill="none" stroke="#FFB347" stroke-width="1.5"
              stroke-linecap="round" opacity="0.85"/>
        <path d="M -34,8 C -28,12 -22,14 -16,14"
              fill="none" stroke="#FFB347" stroke-width="1.5"
              stroke-linecap="round" opacity="0.85"/>
        <path d="M 16,14 C 22,14 28,12 34,8"
              fill="none" stroke="#FFB347" stroke-width="1.5"
              stroke-linecap="round" opacity="0.85"/>
        <!-- Rim along raised arms -->
        <path d="M -28,-6 C -22,-12 -14,-22 -10,-28"
              fill="none" stroke="#FFB347" stroke-width="1.5"
              stroke-linecap="round" opacity="0.85"/>
        <path d="M  28,-6 C  22,-12  14,-22  10,-28"
              fill="none" stroke="#FFB347" stroke-width="1.5"
              stroke-linecap="round" opacity="0.85"/>
      </g>
    </svg>

    </div><!-- /#sunset-camera -->
    </div><!-- /#sunset-grade -->

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // mulberry32 PRNG (seeded; deterministic; never touches Math.random/Date.now)
        function mulberry32(a) {
          return function () {
            a |= 0; a = a + 0x6D2B79F5 | 0;
            let t = a;
            t = Math.imul(t ^ t >>> 15, t | 1);
            t ^= t + Math.imul(t ^ t >>> 7, t | 61);
            return ((t ^ t >>> 14) >>> 0) / 4294967296;
          };
        }
        const rand = mulberry32(0x5C4D5E5F);

        // ----- Entrance fades -----
        tl.fromTo("#sunset-sky",     { opacity: 0 }, { opacity: 1, duration: 0.6, ease: "power2.out" }, 0);
        tl.fromTo("#sunset-clouds",  { opacity: 0 }, { opacity: 1, duration: 1.0, ease: "power2.out" }, 0.2);
        tl.fromTo("#sunset-dust",    { opacity: 0 }, { opacity: 1, duration: 1.2, ease: "power2.out" }, 0.4);
        tl.fromTo("#sunset-glows",   { opacity: 0 }, { opacity: 1, duration: 0.9, ease: "power2.out" }, 0.2);
        tl.fromTo("#sunset-corona",  { opacity: 0 }, { opacity: 1, duration: 1.2, ease: "power2.out" }, 0.3);
        tl.fromTo("#sunset-suns",    { opacity: 0 }, { opacity: 1, duration: 0.8, ease: "power2.out" }, 0.3);
        tl.fromTo("#sunset-sun-shimmer", { opacity: 0 }, { opacity: 0.7, duration: 0.9, ease: "power2.out" }, 0.4);
        tl.fromTo("#sunset-haze",    { opacity: 0 }, { opacity: 0.85, duration: 1.0, ease: "power2.out" }, 0.2);
        tl.fromTo("#sunset-dunes",   { opacity: 0 }, { opacity: 1, duration: 0.7, ease: "power2.out" }, 0.4);
        tl.fromTo("#sunset-figure",  { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.9, ease: "power2.out" }, 0.6);

        // ----- Twin sun descent over the full 8s (slow, contemplative).
        // Primary drops from 640 -> 700, secondary 700 -> 740. Suns stay
        // separated and above the horizon (~752) for the duration. -----
        tl.to("#sun-a-disc", { attr: { cy: 700 }, duration: 8, ease: "power1.in" }, 0);
        tl.to("#sun-b-disc", { attr: { cy: 740 }, duration: 8, ease: "power1.in" }, 0);
        tl.to("#sun-glow-a", { attr: { cy: 700 }, duration: 8, ease: "power1.in" }, 0);
        tl.to("#sun-glow-b", { attr: { cy: 740 }, duration: 8, ease: "power1.in" }, 0);

        // ----- Heat-haze breathing (after fade-in completes); overwrite the fade -----
        tl.to("#sunset-haze",
          { opacity: 0.55, duration: 3.0, ease: "sine.inOut", yoyo: true, repeat: 1, overwrite: "auto" },
          1.6);

        // ----- Sun-local heat shimmer — fast yoyo (~0.6s each), finite reps.
        // 12 cycles * 0.6s = 7.2s, leaving the start-fade-in buffer untouched.
        tl.to("#sunset-sun-shimmer", {
          opacity: 0.45,
          scaleX: 1.06,
          scaleY: 0.92,
          transformOrigin: "50% 50%",
          duration: 0.6,
          ease: "sine.inOut",
          yoyo: true,
          repeat: 11,
          overwrite: "auto"
        }, 0.9);

        // ----- Sky deepens slightly toward warmer/darker as suns lower -----
        tl.fromTo("#sunset-sky",
          { filter: "brightness(1.05) saturate(1.0)" },
          { filter: "brightness(0.85) saturate(1.18)", duration: 8, ease: "power1.inOut", overwrite: "auto" }, 0);

        // ----- Wind: 5 dust streaks drift left-ward over the full 8s -----
        tl.fromTo(".dust-streak",
          { x: 0,    opacity: 0 },
          { x: -100, opacity: 0.30, duration: 8, ease: "none",
            stagger: { each: 0.6, from: "start" }, overwrite: "auto" }, 0);

        // ----- Cloud bands drift slowly horizontally (10..30px each).
        // Use seeded PRNG so directions/distances are deterministic. -----
        const cloudEls = ["#sunset-clouds .cloud-band:nth-child(1)",
                          "#sunset-clouds .cloud-band:nth-child(2)",
                          "#sunset-clouds .cloud-band:nth-child(3)",
                          "#sunset-clouds .cloud-band:nth-child(4)",
                          "#sunset-clouds .cloud-band:nth-child(5)"];
        // Pre-resolve elements once via querySelector to avoid repeated DOM walks.
        const cloudRoot = document.currentScript && document.currentScript.previousElementSibling;
        // Targets via querySelectorAll within the composition root for safety.
        const clouds = (function() {
          const tpl = document.getElementById("scene-sunset-template");
          // Prefer the live root after stamp; fall back to template for parse-time use.
          const live = document.querySelector('[data-composition-id="scene-sunset"]');
          const scope = live || (tpl && tpl.content) || document;
          return scope.querySelectorAll("#sunset-clouds .cloud-band");
        })();
        for (let i = 0; i < clouds.length; i++) {
          const dir = rand() < 0.5 ? -1 : 1;
          const dist = 10 + Math.floor(rand() * 21); // 10..30
          tl.fromTo(clouds[i],
            { x: 0 },
            { x: dir * dist, duration: 8, ease: "none", overwrite: "auto" }, 0);
        }

        // ----- Sun corona slow rotation over 8s (rotation: 360, ease none) -----
        tl.fromTo("#sunset-corona-spokes",
          { rotation: 0,   transformOrigin: "900px 640px" },
          { rotation: 360, transformOrigin: "900px 640px",
            duration: 8, ease: "none", overwrite: "auto" }, 0);

        // ----- Camera slow push-in (1.0 -> 1.03 over 8s) -----
        tl.fromTo("#sunset-camera",
          { scale: 1.0,  transformOrigin: "50% 55%" },
          { scale: 1.03, transformOrigin: "50% 55%",
            duration: 8, ease: "none", overwrite: "auto" }, 0);

        // ----- Color grading shift (whole-scene filter on grade wrapper).
        // brightness 1.0 -> 0.85, saturate 1.0 -> 1.2, hue-rotate 0 -> -3deg. -----
        tl.fromTo("#sunset-grade",
          { filter: "brightness(1.0) saturate(1.0) hue-rotate(0deg)" },
          { filter: "brightness(0.85) saturate(1.2) hue-rotate(-3deg)",
            duration: 8, ease: "power1.inOut", overwrite: "auto" }, 0);

        // ----- Luke's poncho hem ripples in the wind. attr d morph,
        // 7 yoyo cycles of 1s each = ~8s of subtle motion. -----
        tl.to("#luke-hem", {
          attr: { d: "M -44,72 C -30,80 -14,70 0,78 C 14,82 30,72 44,72 L 46,86 L -46,86 Z" },
          duration: 1.0, ease: "sine.inOut", yoyo: true, repeat: 7, overwrite: "auto"
        }, 0.9);

        window.__timelines["scene-sunset"] = tl;
      })();
    </script>
  </div>
