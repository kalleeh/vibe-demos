<template id="scene-launch-template">
  <div data-composition-id="scene-launch" data-width="1920" data-height="1080"
       data-layout-allow-overflow
       style="position:relative;width:100%;height:100%;overflow:hidden;background:#03030a;">

    <!-- Deep space backdrop -->
    <div id="launch-bg" class="clip" data-start="0" data-duration="6" data-track-index="0"
         style="position:absolute;inset:0;
                background:radial-gradient(ellipse at 50% 60%, #0c1428 0%, #050514 55%, #020208 100%);"></div>

    <!-- Streaking starfield (parallax) -->
    <svg id="launch-stars" class="clip" data-start="0" data-duration="6" data-track-index="1"
         data-layout-allow-overflow
         viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice"
         style="position:absolute;inset:0;width:100%;height:100%;"></svg>

    <!-- Yavin moon planet horizon -->
    <svg id="launch-yavin" class="clip" data-start="0" data-duration="6" data-track-index="2"
         data-layout-allow-overflow
         viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice"
         style="position:absolute;inset:0;width:100%;height:100%;">
      <defs>
        <radialGradient id="yavin-grad" cx="35%" cy="40%" r="65%">
          <stop offset="0%"  stop-color="#7fd99e"/>
          <stop offset="55%" stop-color="#2f7a4a"/>
          <stop offset="100%" stop-color="#0a2818"/>
        </radialGradient>
      </defs>
      <circle cx="1500" cy="1500" r="900" fill="url(#yavin-grad)" opacity="0.92" data-layout-allow-overflow/>
      <ellipse cx="1500" cy="1500" rx="900" ry="900"
               fill="none" stroke="#9fe9b8" stroke-width="2" opacity="0.18" data-layout-allow-overflow/>
    </svg>

    <!-- X-wing flight path -->
    <svg id="launch-stage" class="clip" data-start="0" data-duration="6" data-track-index="3"
         viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice"
         style="position:absolute;inset:0;width:100%;height:100%;overflow:visible;">

      <defs>
        <!-- Engine glow gradient -->
        <radialGradient id="engine-glow" cx="50%" cy="50%" r="50%">
          <stop offset="0%"  stop-color="#FFFFFF"/>
          <stop offset="35%" stop-color="#9FE9FF"/>
          <stop offset="100%" stop-color="#9FE9FF" stop-opacity="0"/>
        </radialGradient>
        <!-- Hidden flight path -->
        <path id="xw-path" d="M -200,820 C 300,820 700,720 1000,560 C 1300,400 1600,260 2120,120"
              fill="none" stroke="none" />
      </defs>

      <!-- X-Wing group -->
      <g id="xwing" style="filter:drop-shadow(0 0 6px rgba(159,233,255,0.35));">
        <!-- Engine glow halos (behind fuselage) -->
        <g id="xw-engines">
          <circle cx="-58" cy="-22" r="14" fill="url(#engine-glow)"/>
          <circle cx="-58" cy="22"  r="14" fill="url(#engine-glow)"/>
          <circle cx="-58" cy="-2"  r="11" fill="url(#engine-glow)"/>
        </g>

        <!-- Body (rotated so nose points along +x) -->
        <g>
          <!-- S-foils — closed up for now, but split top/bottom for the silhouette -->
          <polygon points="-50,-46 22,-12 -50,-30" fill="#d8d2c4" stroke="#5b5448" stroke-width="1"/>
          <polygon points="-50,46 22,12 -50,30"   fill="#d8d2c4" stroke="#5b5448" stroke-width="1"/>
          <polygon points="-50,-30 30,-8 -50,-14" fill="#bdb6a6" stroke="#5b5448" stroke-width="1"/>
          <polygon points="-50,30 30,8  -50,14"   fill="#bdb6a6" stroke="#5b5448" stroke-width="1"/>

          <!-- Wingtip cannons -->
          <rect x="20" y="-50" width="22" height="4" fill="#3a342c"/>
          <rect x="20" y="46"  width="22" height="4" fill="#3a342c"/>

          <!-- Fuselage -->
          <polygon points="-60,-9 36,-7 60,0 36,7 -60,9" fill="#e7e2d6" stroke="#3a342c" stroke-width="1"/>
          <!-- Cockpit canopy -->
          <path d="M 8,-6 Q 22,-8 30,0 Q 22,8 8,6 Z" fill="#1a3a52" stroke="#0e2030" stroke-width="0.8"/>
          <!-- Red stripe -->
          <rect x="-30" y="-1" width="40" height="2" fill="#FF3030" opacity="0.85"/>
        </g>
      </g>

      <!-- Engine trail (drawn separately so it follows ship) -->
      <g id="xw-trail" style="filter:blur(1px);opacity:0.85;mix-blend-mode:screen;">
        <ellipse cx="-200" cy="0" rx="180" ry="6" fill="#9FE9FF" opacity="0.22"/>
        <ellipse cx="-120" cy="0" rx="80"  ry="3" fill="#FFFFFF" opacity="0.55"/>
      </g>
    </svg>

    <!-- Comms HUD overlay -->
    <div id="launch-hud" class="clip" data-start="0" data-duration="6" data-track-index="4"
         data-layout-allow-overflow
         style="position:absolute;left:96px;bottom:120px;width:560px;
                font-family:'Helvetica Neue','Arial',sans-serif;color:#9FE9FF;
                font-size:22px;letter-spacing:0.10em;text-transform:uppercase;
                opacity:0;line-height:1.5;box-sizing:border-box;">
      <div style="opacity:0.55;font-size:15px;margin-bottom:0.5em;">RED LEADER</div>
      <div>All wings, report in.</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/MotionPathPlugin.min.js"></script>
    <script>
      (function () {
        gsap.registerPlugin(MotionPathPlugin);

        // Deterministic starfield (some streaking, some still)
        function mulberry32(seed) {
          return function () {
            let t = (seed += 0x6d2b79f5);
            t = Math.imul(t ^ (t >>> 15), t | 1);
            t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
            return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
          };
        }
        const rnd = mulberry32(0x5ca1ab1e);
        const svg = document.getElementById("launch-stars");
        const ns = "http://www.w3.org/2000/svg";
        for (let i = 0; i < 240; i++) {
          const c = document.createElementNS(ns, "circle");
          c.setAttribute("cx", (rnd() * 1920).toFixed(1));
          c.setAttribute("cy", (rnd() * 1080).toFixed(1));
          const r = rnd();
          c.setAttribute("r", (0.5 + r * 1.4).toFixed(2));
          c.setAttribute("fill", "#F5F5F5");
          c.setAttribute("opacity", (0.45 + r * 0.5).toFixed(2));
          svg.appendChild(c);
        }

        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // Initial state
        tl.fromTo("#launch-bg",     { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power2.out" }, 0);
        tl.fromTo("#launch-stars",  { opacity: 0 }, { opacity: 1, duration: 0.6, ease: "power2.out" }, 0.1);
        tl.fromTo("#launch-yavin",  { opacity: 0 }, { opacity: 1, duration: 1.0, ease: "power2.out" }, 0.2);

        // Subtle camera pan — starfield drifts
        tl.to("#launch-stars", { x: -120, duration: 6, ease: "none" }, 0);
        tl.to("#launch-yavin", { x: -40, duration: 6, ease: "none" }, 0);

        // X-wing flies along the curved path, rotating to align
        gsap.set("#xwing", { transformOrigin: "0% 50%" });
        tl.to("#xwing", {
          duration: 4.6,
          ease: "power1.inOut",
          motionPath: {
            path: "#xw-path",
            align: "#xw-path",
            alignOrigin: [0.5, 0.5],
            autoRotate: true
          }
        }, 0.6);

        // Engine glow pulses (steady throb)
        tl.fromTo("#xw-engines",
          { opacity: 0.7, scale: 0.92, transformOrigin: "-58px 0px" },
          { opacity: 1.0, scale: 1.08, duration: 0.45, ease: "sine.inOut",
            yoyo: true, repeat: 11 }, 0.6);

        // Trail mirrors ship path (re-uses motionpath positions sampled discretely)
        tl.to("#xw-trail", {
          duration: 4.6,
          ease: "power1.inOut",
          motionPath: {
            path: "#xw-path",
            align: "#xw-path",
            alignOrigin: [0.85, 0.5],
            autoRotate: true
          }
        }, 0.6);
        tl.fromTo("#xw-trail", { opacity: 0 }, { opacity: 0.85, duration: 0.5, ease: "power2.out" }, 0.6);
        tl.to("#xw-trail", { opacity: 0, duration: 0.6, ease: "power2.in" }, 5.0);

        // HUD callout fades in
        tl.fromTo("#launch-hud", { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.7, ease: "power2.out" }, 1.6);

        window.__timelines["scene-launch"] = tl;
      })();
    </script>
  </div>
</template>
