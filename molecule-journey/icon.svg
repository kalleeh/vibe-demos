<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#050608"/>
  <!-- CH4: central carbon + 4 tetrahedral hydrogens -->
  <g stroke="#6cc5ff" stroke-width="6" stroke-linecap="round">
    <line x1="256" y1="256" x2="356" y2="156"/>
    <line x1="256" y1="256" x2="156" y2="356"/>
    <line x1="256" y1="256" x2="156" y2="176"/>
    <line x1="256" y1="256" x2="356" y2="336"/>
  </g>
  <!-- Carbon nucleus with halo -->
  <circle cx="256" cy="256" r="60" fill="none" stroke="#6cc5ff" stroke-width="2" opacity="0.4"/>
  <circle cx="256" cy="256" r="42" fill="#1a2538" stroke="#6cc5ff" stroke-width="3"/>
  <!-- Hydrogens -->
  <circle cx="356" cy="156" r="22" fill="#eaf3ff"/>
  <circle cx="156" cy="356" r="22" fill="#eaf3ff"/>
  <circle cx="156" cy="176" r="22" fill="#eaf3ff"/>
  <circle cx="356" cy="336" r="22" fill="#eaf3ff"/>
</svg>
