<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>우리 아이 책 친구 📚</title>
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#f7b733">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="책친구">
<style>
  :root{
    --paper:#fbf3e2; --ink:#3a3026; --accent:#e8643c; --accent2:#f7b733;
    --blue:#7ec4e6; --green:#9cd07f; --pink:#f4a6c0; --purple:#c4a6e6;
    --chip:#fff; --shadow:rgba(58,48,38,.12);
    font-size:17px;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);
    font-family:"Pretendard","Apple SD Gothic Neo","Noto Sans KR",system-ui,sans-serif;
    -webkit-text-size-adjust:100%;
    background-image:
      radial-gradient(circle at 12% 18%, rgba(247,183,51,.10) 0 14px, transparent 15px),
      radial-gradient(circle at 86% 30%, rgba(126,196,230,.12) 0 18px, transparent 19px),
      radial-gradient(circle at 70% 82%, rgba(244,166,192,.12) 0 16px, transparent 17px),
      radial-gradient(circle at 22% 88%, rgba(156,208,127,.12) 0 16px, transparent 17px);
    background-attachment:fixed;
  }

  .wrap{max-width:640px;margin:0 auto;padding:22px 18px 64px;}

  /* ── Header ── */
  header{text-align:center;padding:18px 4px 8px;}
  h1{
    margin:.1em 0 .25em;font-weight:900;line-height:1.05;
    font-size:clamp(2rem,8vw,2.9rem);letter-spacing:-.01em;
    color:var(--ink);filter:url(#crayon);
    text-shadow:2px 3px 0 rgba(247,183,51,.45);
  }
  .sub{margin:0 auto;max-width:30em;font-size:.96rem;color:#6b5d4c;line-height:1.5;}

  /* ── Panel card ── */
  .card{
    background:#fff;border:3px solid var(--ink);border-radius:26px;
    padding:20px 18px 18px;margin-top:22px;
    box-shadow:6px 8px 0 var(--shadow);filter:url(#crayon);
  }
  .group{margin-bottom:18px;}
  .group:last-of-type{margin-bottom:8px;}
  .group > .lab{
    display:block;font-weight:800;font-size:1.02rem;margin:0 0 9px;
    color:var(--ink);
  }
  .group > .lab .hint{font-weight:600;font-size:.82rem;color:#9a8b78;}

  .chips{display:flex;flex-wrap:wrap;gap:9px;}

  /* ── Chip pills (Task 3 fills the containers; this styles them) ── */
  .chip{
    display:inline-flex;align-items:center;justify-content:center;
    min-height:44px;padding:9px 16px;
    font:inherit;font-weight:700;font-size:.96rem;
    background:var(--chip);color:var(--ink);
    border:2.5px solid var(--ink);border-radius:22px;
    cursor:pointer;user-select:none;
    filter:url(#crayon);
    transition:transform .12s ease, background .12s ease, box-shadow .12s ease;
  }
  .chip:hover{transform:translateY(-1px) rotate(-.6deg);}
  .chip:active{transform:scale(.96);}
  /* crayon icon chips: icon + label side by side */
  .chip.has-ic{padding-left:10px;gap:6px;}
  .chip-ic{
    width:26px;height:26px;object-fit:contain;display:block;flex:0 0 auto;
    /* the icon is full-color art; the crayon filter would smear it, so leave it un-filtered */
    pointer-events:none;
  }
  .chip-tx{display:inline-block;}
  /* pastel rotation so a row of chips reads like crayons */
  .chips .chip:nth-child(5n+1){background:#fff4dd;}
  .chips .chip:nth-child(5n+2){background:#e7f4fb;}
  .chips .chip:nth-child(5n+3){background:#eef8e6;}
  .chips .chip:nth-child(5n+4){background:#fdeaf1;}
  .chips .chip:nth-child(5n+5){background:#f1eafb;}
  /* must out-rank the .chips .chip:nth-child pastel rules (specificity 0-3-0) */
  .chips .chip[aria-pressed="true"]{
    background:var(--accent);color:#fff;border-color:var(--ink);
    box-shadow:3px 4px 0 var(--shadow);
    animation:wiggle .4s ease;
  }
  @keyframes wiggle{
    0%{transform:scale(1) rotate(0)}
    30%{transform:scale(1.1) rotate(-3deg)}
    60%{transform:scale(1.06) rotate(2.5deg)}
    100%{transform:scale(1.05) rotate(0)}
  }

  /* ── Note box ── */
  #noteBox{
    width:100%;min-height:74px;resize:vertical;
    font:inherit;font-size:.98rem;line-height:1.5;color:var(--ink);
    padding:12px 14px;background:#fffdf7;
    border:2.5px solid var(--ink);border-radius:18px;
    filter:url(#crayon);
  }
  #noteBox::placeholder{color:#b3a692;}
  #noteBox:focus{outline:none;box-shadow:3px 4px 0 var(--shadow);}

  /* ── Footer actions ── */
  .actions{
    display:flex;flex-wrap:wrap;align-items:center;gap:12px;
    margin-top:16px;
  }
  #findBtn{
    flex:1 1 auto;min-height:56px;padding:14px 22px;
    font:inherit;font-weight:900;font-size:1.18rem;color:#fff;
    background:var(--accent);
    border:3px solid var(--ink);border-radius:24px;
    cursor:pointer;filter:url(#crayon);
    box-shadow:5px 6px 0 var(--shadow);
    transition:transform .12s ease, box-shadow .12s ease;
  }
  #findBtn:hover{transform:translateY(-2px);}
  #findBtn:active{transform:translateY(1px);box-shadow:3px 3px 0 var(--shadow);}

  #aiToggle{
    flex:0 0 auto;min-height:48px;padding:10px 16px;
    font:inherit;font-weight:800;font-size:.95rem;color:var(--ink);
    background:transparent;
    border:2.5px dashed var(--ink);border-radius:22px;
    cursor:pointer;filter:url(#crayon);
    transition:transform .12s ease, background .12s ease, color .12s ease;
  }
  #aiToggle:hover{transform:translateY(-1px);}
  #aiToggle[aria-pressed="true"]{
    background:var(--accent2);border-style:solid;color:var(--ink);
    box-shadow:3px 4px 0 var(--shadow);
  }

  /* ── Results ── */
  #results{margin-top:26px;}
  #results:empty{min-height:8px;}

  .resbar{
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    margin-bottom:14px;font-weight:800;font-size:1.04rem;color:var(--ink);
  }
  .resbar > span{display:inline-flex;align-items:baseline;flex-wrap:wrap;gap:.1em;}
  /* the " · 추천 예시" suffix reads as a subtle demo-mode label */
  .resbar > span{position:relative;}
  .reroll{
    flex:0 0 auto;min-height:44px;padding:9px 16px;
    font:inherit;font-weight:800;font-size:.92rem;color:var(--ink);
    background:var(--accent2);
    border:2.5px solid var(--ink);border-radius:20px;
    cursor:pointer;filter:url(#crayon);
    box-shadow:3px 4px 0 var(--shadow);
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .reroll:hover{transform:translateY(-1px) rotate(-.8deg);}
  .reroll:active{transform:translateY(1px);box-shadow:2px 2px 0 var(--shadow);}

  /* demo-mode pill: visibly label canned output */
  .resbar .demo-pill{
    font-weight:700;font-size:.78rem;font-style:italic;color:#9a8b78;
  }

  .grid{display:grid;grid-template-columns:1fr;gap:16px;}
  @media (min-width:640px){ .grid{grid-template-columns:1fr 1fr;} }

  .bookcard{
    display:flex;gap:14px;align-items:flex-start;
    background:#fff;border:2.5px solid var(--ink);border-radius:20px;
    padding:14px;box-shadow:5px 6px 0 var(--shadow);
    filter:url(#crayon);height:100%;
  }
  @media (max-width:380px){ .bookcard{flex-direction:column;} }

  .cover{
    flex:0 0 auto;width:92px;aspect-ratio:4/5;
    border-radius:8px;overflow:hidden;
    background:#fffdf7;
  }
  /* the authored SVG placeholder is 4:5, so it fills the box cleanly */
  .cover svg{
    width:100%;height:100%;object-fit:cover;border-radius:6px;display:block;
  }
  /* real covers vary in aspect — contain (never crop), letterbox on paper, fade in */
  .cover .realcover{
    width:100%;height:100%;object-fit:contain;border-radius:6px;display:block;
    animation:coverIn .4s ease both;
  }
  @keyframes coverIn{ from{opacity:0;} to{opacity:1;} }

  .info{flex:1 1 auto;min-width:0;}
  .toprow{display:flex;align-items:center;gap:7px;margin-bottom:5px;flex-wrap:wrap;}
  .flag{font-size:1.25rem;line-height:1;}
  .lvl{
    font-size:.74rem;font-weight:800;padding:3px 9px;border-radius:12px;
    background:var(--blue);color:var(--ink);border:1.5px solid var(--ink);
  }
  /* per-book progressive load: badge while this card's AI text is being written */
  .aibadge{
    font-size:.74rem;font-weight:800;padding:3px 9px;border-radius:12px;
    background:var(--accent2);color:var(--ink);border:1.5px dashed var(--ink);
    animation:badgePulse 1.1s ease-in-out infinite;
  }
  @keyframes badgePulse{ 0%,100%{opacity:1} 50%{opacity:.5} }
  /* a pending card's catalog blurb sits slightly dimmed until the AI text lands */
  .bookcard.ai-pending .why-tx, .bookcard.ai-pending .tip-tx{ opacity:.5; }
  .bookcard .why-tx, .bookcard .tip-tx{ transition:opacity .3s ease; }
  .bookcard.ai-justfilled{ animation:cardFill .7s ease; }
  @keyframes cardFill{ 0%{background:#fff8e6} 100%{background:transparent} }
  .btitle{margin:.1em 0 .15em;font-weight:900;font-size:1.05rem;line-height:1.2;}
  .bmeta{font-size:.82rem;color:#9a8b78;margin-bottom:8px;}
  .why, .tip{margin:.35em 0;font-size:.92rem;line-height:1.45;}
  .why b, .tip b{color:var(--accent);font-weight:800;margin-right:.2em;}

  /* AI-error fallback note */
  .ainote{
    margin:0 0 14px;padding:10px 14px;
    background:#fff4dd;border:2px dashed var(--ink);border-radius:16px;
    font-size:.9rem;font-weight:700;color:var(--ink);
    filter:url(#crayon);
  }

  /* Staggered draw-on */
  .cardwrap{
    animation:drawOn .45s ease both;
    animation-delay:calc(var(--i) * 90ms);
  }
  @keyframes drawOn{
    from{opacity:0;transform:translateY(14px);}
    to{opacity:1;transform:translateY(0);}
  }

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important;transition:none !important;}
    .cardwrap{animation:none !important;opacity:1 !important;transform:none !important;}
  }
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <filter id="crayon"><feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="3" seed="7" result="n"/>
  <feDisplacementMap in="SourceGraphic" in2="n" scale="3.4"/></filter>
</svg>

<div class="wrap">
  <header>
    <h1>우리 아이 책 친구 📚</h1>
    <p class="sub">나이와 좋아하는 것을 골라 보세요 — 한국어·영어 그림책을 함께 추천해 드려요</p>
  </header>

  <main class="card">
    <div class="group">
      <span class="lab" id="ageLab">나이</span>
      <div class="chips" id="ageChips" role="group" aria-labelledby="ageLab"></div>
    </div>

    <div class="group">
      <span class="lab" id="genderLab">성별</span>
      <div class="chips" id="genderChips" role="group" aria-labelledby="genderLab"></div>
    </div>

    <div class="group">
      <span class="lab" id="themeLab">좋아하는 것 <span class="hint">(여러 개 선택)</span></span>
      <div class="chips" id="themeChips" role="group" aria-labelledby="themeLab"></div>
    </div>

    <div class="group">
      <span class="lab" id="moodLab">분위기 <span class="hint">(여러 개 선택)</span></span>
      <div class="chips" id="moodChips" role="group" aria-labelledby="moodLab"></div>
    </div>

    <div class="group">
      <label class="lab" for="noteBox">한마디 <span class="hint">(선택)</span></label>
      <textarea id="noteBox" placeholder="예: 요즘 공룡에 푹 빠져있어요"></textarea>
    </div>

    <div class="actions">
      <button type="button" id="aiToggle" aria-pressed="false">✨ AI 맞춤 추천</button>
      <button type="button" id="findBtn">책 찾아주세요! ✏️</button>
    </div>
  </main>

  <section id="results" aria-live="polite"></section>
</div>

<script src="./catalog.js"></script>
<script src="./app.js"></script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => navigator.serviceWorker.register("./sw.js").catch(()=>{}));
  }
</script>
</body>
</html>
