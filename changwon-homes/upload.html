<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>파일 업로드 · Changwon Homes (private)</title>
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#2f6f6b">
<style>
  :root{
    --paper:#f5f1e8; --panel:#fbf8f0; --ink:#23211c; --muted:#6f6a5d;
    --line:#e3dcca; --line-strong:#d3c9b1; --teal:#2f6f6b; --teal-deep:#235552;
    --good:#3f8f5b; --bad:#c0492f;
    --mono:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%}
  body{
    font-family:-apple-system,system-ui,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    background:var(--paper); color:var(--ink); -webkit-font-smoothing:antialiased;
    display:flex; align-items:flex-start; justify-content:center; padding:24px 16px 60px;
  }
  .card{
    width:100%; max-width:440px; background:var(--panel); border:1px solid var(--line);
    border-radius:18px; box-shadow:0 8px 28px rgba(35,33,28,.12); padding:22px 20px;
  }
  h1{font-size:18px; margin:0 0 2px; letter-spacing:-.01em}
  .lock{font-size:13px; color:var(--muted); margin:0 0 18px}
  .lock b{color:var(--teal-deep)}
  label{display:block; font-size:12px; font-weight:600; color:var(--muted); margin:12px 0 5px}
  input[type=email],input[type=password],input[type=text]{
    width:100%; font:inherit; font-size:16px; /* 16px stops iOS zoom-on-focus */
    padding:11px 12px; border:1px solid var(--line-strong); border-radius:11px;
    background:#fff; color:var(--ink);
  }
  input[type=file]{
    width:100%; font-size:14px; padding:14px; border:1.5px dashed var(--line-strong);
    border-radius:11px; background:#fff; margin-top:4px;
  }
  button{
    width:100%; font:inherit; font-size:15px; font-weight:600; margin-top:16px;
    padding:13px; border:0; border-radius:11px; background:var(--teal); color:#fff; cursor:pointer;
  }
  button:disabled{opacity:.5; cursor:default}
  button.ghost{background:transparent; color:var(--muted); border:1px solid var(--line-strong); margin-top:8px}
  .hide{display:none!important}
  .msg{font-size:13px; margin-top:14px; padding:10px 12px; border-radius:10px; line-height:1.5}
  .msg.err{background:rgba(192,73,47,.1); color:var(--bad); border:1px solid rgba(192,73,47,.3)}
  .msg.ok{background:rgba(63,143,91,.1); color:var(--good); border:1px solid rgba(63,143,91,.3)}
  .msg.info{background:rgba(47,111,107,.08); color:var(--teal-deep); border:1px solid rgba(47,111,107,.25)}
  .who{font-size:12px; color:var(--muted); font-family:var(--mono)}
  .filelist{margin:10px 0 0; padding:0; list-style:none; font-size:12.5px; font-family:var(--mono)}
  .filelist li{display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid var(--line)}
  .filelist li .st{color:var(--muted)}
  .filelist li .st.done{color:var(--good)} .filelist li .st.fail{color:var(--bad)}
  .bar{height:4px; border-radius:2px; background:var(--line); overflow:hidden; margin-top:14px}
  .bar > span{display:block; height:100%; width:0; background:var(--teal); transition:width .3s}
  .foot{font-size:11px; color:var(--muted); margin-top:18px; line-height:1.6}
  @keyframes shimmer{0%{background-position:-200px 0}100%{background-position:200px 0}}
  .working{background:linear-gradient(90deg,var(--teal),var(--teal-deep),var(--teal)); background-size:200px 100%;
    animation:shimmer 1.1s linear infinite; -webkit-background-clip:text; background-clip:text; color:transparent}
  @media (prefers-reduced-motion:reduce){.working{animation:none;color:var(--teal)}.bar>span{transition:none}}
</style>
</head>
<body>
<div class="card">
  <h1>창원 아파트 · 파일 업로드</h1>
  <p class="lock">🔒 <b>비공개 업로드</b> — 로그인한 사람만 파일을 올릴 수 있습니다.</p>

  <!-- LOGIN -->
  <section id="loginView">
    <label for="email">이메일</label>
    <input id="email" type="email" autocomplete="username" inputmode="email" placeholder="uploader@…" autocapitalize="off" autocorrect="off">
    <label for="pw">비밀번호</label>
    <input id="pw" type="password" autocomplete="current-password" placeholder="••••••••">
    <button id="loginBtn">로그인</button>
    <div id="loginMsg"></div>
  </section>

  <!-- UPLOAD -->
  <section id="uploadView" class="hide">
    <p class="who">로그인: <span id="whoami">—</span> <a href="#" id="logout" style="color:var(--teal-deep)">로그아웃</a></p>
    <label for="files">엑셀/CSV 파일 선택 (여러 개 가능)</label>
    <input id="files" type="file" multiple accept=".xlsx,.xls,.csv,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel,text/csv">
    <label for="note">메모 (선택)</label>
    <input id="note" type="text" maxlength="200" placeholder="예: 창원 매매 2025-06 ~ 2026-05">
    <ul id="filelist" class="filelist"></ul>
    <div class="bar hide" id="barWrap"><span id="bar"></span></div>
    <button id="uploadBtn" disabled>업로드</button>
    <div id="uploadMsg"></div>
  </section>

  <p class="foot">
    PocketBase 비공개 보관함. 업로드된 파일은 목록·조회가 불가능하며(쓰기 전용),
    서버에서 직접 회수됩니다. 비밀번호는 이 기기 메모리에만 잠시 보관되고 저장되지 않습니다.
  </p>
</div>

<script>
/* changwon-homes private upload chute.
 *
 * Talks cross-origin to the PocketBase instance — same pattern every other
 * vibe-demo uses (frontend on Pages, API on *.pb.gurum.se). We deliberately
 * load the SDK via dynamic import() of a FULL URL rather than a static
 * importmap import: iOS Safari importmaps are fragile and a failed static
 * import throws at module-eval and kills the whole page. (Lesson cribbed from
 * tinywings/index.html.) SDK pinned 0.26.2 per the current CLAUDE.md rule.
 *
 * Auth: PocketBase password auth against the `uploaders` collection. Token is
 * kept ONLY in the in-memory authStore default (no localStorage persistence),
 * so closing the tab logs you out.
 */
const PB_URL = "https://changwon-homes.pb.gurum.se";
const PB_ESM = "https://cdn.jsdelivr.net/npm/pocketbase@0.26.2/dist/pocketbase.es.mjs";

const $ = (id) => document.getElementById(id);
let pb = null;

function setMsg(el, text, kind){
  el.className = "msg " + (kind || "info");
  el.textContent = text;
}
function clearMsg(el){ el.className = ""; el.textContent = ""; }

async function getPB(){
  if (pb) return pb;
  const m = await import(PB_ESM);
  pb = new m.default(PB_URL);
  return pb;
}

/* ---- login ---- */
$("loginBtn").addEventListener("click", async () => {
  const email = $("email").value.trim();
  const pw = $("pw").value;
  if (!email || !pw){ setMsg($("loginMsg"), "이메일과 비밀번호를 입력하세요.", "err"); return; }
  $("loginBtn").disabled = true;
  setMsg($("loginMsg"), "로그인 중…", "info"); $("loginMsg").classList.add("working");
  try {
    const client = await getPB();
    await client.collection("uploaders").authWithPassword(email, pw);
    $("loginMsg").classList.remove("working"); clearMsg($("loginMsg"));
    $("whoami").textContent = client.authStore.record?.email || email;
    $("loginView").classList.add("hide");
    $("uploadView").classList.remove("hide");
  } catch (err){
    $("loginMsg").classList.remove("working");
    const status = err?.status;
    setMsg($("loginMsg"),
      status === 400 ? "이메일 또는 비밀번호가 올바르지 않습니다."
      : "로그인 실패: " + (err?.message || "네트워크 오류"), "err");
    $("loginBtn").disabled = false;
  }
});

$("logout").addEventListener("click", (e) => {
  e.preventDefault();
  if (pb) pb.authStore.clear();
  $("uploadView").classList.add("hide");
  $("loginView").classList.remove("hide");
  $("loginBtn").disabled = false;
  $("pw").value = "";
  clearMsg($("uploadMsg")); $("filelist").innerHTML = "";
});

/* ---- file selection ---- */
const fileEl = $("files");
fileEl.addEventListener("change", () => {
  const list = $("filelist"); list.innerHTML = "";
  for (const f of fileEl.files){
    const li = document.createElement("li");
    const nm = document.createElement("span");
    nm.textContent = f.name + " (" + Math.round(f.size/1024) + " KB)";
    const st = document.createElement("span"); st.className = "st"; st.textContent = "대기";
    li.append(nm, st); list.appendChild(li);
  }
  $("uploadBtn").disabled = fileEl.files.length === 0;
});

/* ---- upload (one record per file so a failure isolates) ---- */
$("uploadBtn").addEventListener("click", async () => {
  const files = Array.from(fileEl.files);
  if (!files.length) return;
  const note = $("note").value.trim();
  const rows = $("filelist").children;
  $("uploadBtn").disabled = true; fileEl.disabled = true;
  $("barWrap").classList.remove("hide");
  clearMsg($("uploadMsg"));

  const client = await getPB();
  let done = 0, failed = 0;
  for (let i = 0; i < files.length; i++){
    const st = rows[i].querySelector(".st");
    st.className = "st"; st.textContent = "업로드 중…";
    try {
      const data = new FormData();
      data.set("file", files[i]);
      if (note) data.set("note", note);
      await client.collection("uploads").create(data);
      st.className = "st done"; st.textContent = "완료 ✓"; done++;
    } catch (err){
      st.className = "st fail"; st.textContent = "실패";
      failed++;
      console.error("upload failed", files[i].name, err);
    }
    $("bar").style.width = Math.round(((i+1)/files.length)*100) + "%";
  }

  if (failed === 0){
    setMsg($("uploadMsg"), `✅ ${done}개 파일 업로드 완료. 이제 알려주세요 — 서버에서 회수하겠습니다.`, "ok");
  } else {
    setMsg($("uploadMsg"), `${done}개 성공, ${failed}개 실패. 실패한 파일은 다시 시도하세요.`, "err");
    fileEl.disabled = false; $("uploadBtn").disabled = false;
  }
});
</script>
</body>
</html>
