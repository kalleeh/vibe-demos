<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>창원 아파트 파인더 — Changwon Home Finder</title>

<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#2f6f6b">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="창원 아파트">

<meta name="description" content="창원시 아파트를 지도에서 찾고, 동일 조건(지역·평형·연식·학군) 평균과 비교해 가치점수를 확인하는 데모.">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">

<style>
  :root{
    --paper:#f5f1e8; --panel:#fbf8f0; --ink:#23211c; --muted:#6f6a5d;
    --line:#e3dcca; --line-strong:#d3c9b1;
    --teal:#2f6f6b; --teal-deep:#235552;
    --good:#3f8f5b; --mid:#d9a441; --bad:#c0492f;
    --shadow:0 8px 28px rgba(35,33,28,.14);
    --mono:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{
    font-family:"Inter",-apple-system,system-ui,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    color:var(--ink); background:var(--paper);
    -webkit-font-smoothing:antialiased; overflow:hidden;
  }
  @import url("https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;1,9..144,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+KR:wght@400;500;700&display=swap");

  /* ---------- layout ---------- */
  .app{display:grid;grid-template-rows:auto 1fr;height:100%}
  header.bar{
    display:flex;align-items:center;gap:14px;flex-wrap:wrap;
    padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--line);
    z-index:1200;position:relative;
  }
  .brand{display:flex;align-items:baseline;gap:10px;margin-right:auto}
  .brand h1{
    font-family:"Fraunces",serif;font-weight:500;font-size:19px;margin:0;letter-spacing:-.01em;
    white-space:nowrap;
  }
  .brand .ko{font-weight:700}
  .brand em{font-style:italic;color:var(--teal)}
  .brand .sub{font-size:11px;color:var(--muted);font-family:var(--mono);white-space:nowrap}

  .controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .seg{display:inline-flex;border:1px solid var(--line-strong);border-radius:999px;overflow:hidden;background:#fff}
  .seg button{
    border:0;background:transparent;font:inherit;font-size:13px;font-weight:600;
    padding:7px 16px;cursor:pointer;color:var(--muted);
  }
  .seg button.on{background:var(--teal);color:#fff}
  select,.search input{
    font:inherit;font-size:13px;border:1px solid var(--line-strong);border-radius:999px;
    padding:7px 12px;background:#fff;color:var(--ink);cursor:pointer;
  }
  .search{position:relative;display:flex;align-items:center}
  .search input{cursor:text;width:138px;padding-left:30px}
  .search svg{position:absolute;left:10px;width:14px;height:14px;opacity:.5;pointer-events:none}

  .demo-pill{
    font-family:var(--mono);font-size:11px;color:var(--teal-deep);
    border:1px solid var(--teal);border-radius:999px;padding:4px 10px;
    display:inline-flex;align-items:center;gap:6px;background:rgba(47,111,107,.07);white-space:nowrap;
  }
  .demo-pill .dot{width:7px;height:7px;border-radius:50%;background:var(--teal);
    animation:pulse 2.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

  /* ---------- map + panel ---------- */
  .stage{position:relative;min-height:0}
  #map{position:absolute;inset:0;background:#e9e3d4}
  .leaflet-container{font-family:inherit;background:#e9e3d4}

  /* value legend */
  .legend{
    position:absolute;left:12px;bottom:12px;z-index:900;background:var(--panel);
    border:1px solid var(--line);border-radius:12px;padding:10px 12px;box-shadow:var(--shadow);
    font-size:11.5px;color:var(--muted);max-width:210px;
  }
  .legend b{color:var(--ink);font-size:12px;display:block;margin-bottom:6px;font-weight:600}
  .legend .scale{height:9px;border-radius:5px;margin:6px 0 4px;
    background:linear-gradient(90deg,var(--bad),var(--mid),var(--good))}
  .legend .ends{display:flex;justify-content:space-between;font-size:10.5px}
  .legend .row{display:flex;align-items:center;gap:6px;margin-top:6px}
  .legend .star{color:var(--teal);font-size:13px}

  .countpill{
    position:absolute;right:12px;top:12px;z-index:900;background:var(--panel);
    border:1px solid var(--line);border-radius:999px;padding:6px 12px;box-shadow:var(--shadow);
    font-size:12px;font-weight:600;
  }
  .countpill span{color:var(--teal);font-variant-numeric:tabular-nums}

  /* marker */
  .mk{border-radius:50%;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.35);
    display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;
    font-size:11px;font-family:var(--mono);transition:transform .12s}
  .mk.rec{box-shadow:0 0 0 3px rgba(47,111,107,.45),0 1px 4px rgba(0,0,0,.35)}
  .mk.sel{transform:scale(1.18);box-shadow:0 0 0 4px rgba(47,111,107,.6),0 2px 6px rgba(0,0,0,.4)}

  /* ---------- detail panel ---------- */
  .panel{
    position:absolute;top:0;right:0;height:100%;width:380px;max-width:90vw;
    background:var(--panel);border-left:1px solid var(--line);box-shadow:var(--shadow);
    z-index:1000;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
    display:flex;flex-direction:column;
  }
  .panel.open{transform:translateX(0)}
  .panel .ph{padding:16px 18px 12px;border-bottom:1px solid var(--line);position:relative}
  .panel .close{position:absolute;top:12px;right:12px;border:0;background:#fff;border:1px solid var(--line);
    width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px;color:var(--muted);line-height:1}
  .panel h2{font-family:"Fraunces",serif;font-weight:500;font-size:21px;margin:0 36px 4px 0;letter-spacing:-.01em}
  .panel .loc{font-size:12.5px;color:var(--muted);font-family:var(--mono)}
  .pbody{padding:16px 18px;overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}

  .price-head{display:flex;align-items:baseline;gap:10px;margin-bottom:14px}
  .price-head .big{font-family:"Fraunces",serif;font-size:30px;font-weight:500}
  .price-head .lbl{font-size:12px;color:var(--muted)}

  .cmp{border:1px solid var(--line);border-radius:14px;padding:14px;background:#fff;margin-bottom:14px}
  .cmp h3{margin:0 0 10px;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  .barwrap{position:relative;margin:10px 0 4px}
  .bar{height:30px;border-radius:8px;background:linear-gradient(90deg,#eef3ee,#f3ece0);position:relative;overflow:hidden;border:1px solid var(--line)}
  .bar .fill{height:100%;border-radius:7px 0 0 7px;transition:width .5s ease}
  .bar .avgline{position:absolute;top:-4px;bottom:-4px;width:2px;background:var(--ink);z-index:3}
  .bar .avgflag{position:absolute;top:-19px;transform:translateX(-50%);font-size:10px;font-family:var(--mono);
    color:var(--ink);white-space:nowrap;background:var(--panel);padding:0 3px}
  .bar .val{position:absolute;top:50%;transform:translateY(-50%);left:8px;color:#fff;font-weight:700;font-size:13px;
    text-shadow:0 1px 2px rgba(0,0,0,.3);font-variant-numeric:tabular-nums}
  .delta{font-size:13px;font-weight:600;margin-top:8px}
  .delta.up{color:var(--bad)} .delta.down{color:var(--good)} .delta.flat{color:var(--muted)}
  .cmp .sub{font-size:12px;color:var(--muted);margin-top:2px}

  .metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
  .metric{border:1px solid var(--line);border-radius:11px;padding:10px 12px;background:#fff}
  .metric .k{font-size:11px;color:var(--muted)}
  .metric .v{font-size:15px;font-weight:600;font-variant-numeric:tabular-nums;margin-top:2px}
  .metric .v small{font-size:11px;color:var(--muted);font-weight:400}

  .score{display:flex;align-items:center;gap:14px;border:1px solid var(--line);border-radius:14px;
    padding:14px;background:#fff;margin-bottom:6px}
  .score .ring{position:relative;width:64px;height:64px;flex:none}
  .score .ring svg{transform:rotate(-90deg)}
  .score .ring .n{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-family:"Fraunces",serif;font-size:20px;font-weight:500}
  .score .txt .verdict{font-weight:600;font-size:14px}
  .score .txt .pct{font-size:12.5px;color:var(--muted);margin-top:3px}

  .stars{display:inline-flex;gap:2px;vertical-align:middle}
  .stars i{width:13px;height:13px;display:inline-block;background:var(--line-strong);
    clip-path:polygon(50% 0,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);font-style:normal}
  .stars i.f{background:var(--teal)}

  .peers{margin-top:14px}
  .peers summary{cursor:pointer;font-size:13px;font-weight:600;color:var(--teal-deep);
    padding:10px 0;list-style:none;display:flex;align-items:center;gap:6px;border-top:1px solid var(--line)}
  .peers summary::-webkit-details-marker{display:none}
  .peers summary .chev{transition:transform .2s}
  .peers[open] summary .chev{transform:rotate(90deg)}
  .peer{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);
    font-size:12.5px;cursor:pointer}
  .peer:hover{background:rgba(47,111,107,.05)}
  .peer .nm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .peer .nm small{color:var(--muted);font-family:var(--mono);font-size:10.5px}
  .peer .pr{font-variant-numeric:tabular-nums;font-weight:600;white-space:nowrap}
  .peer .vd{width:42px;text-align:right;font-family:var(--mono);font-size:11px}
  .peer.self{background:rgba(47,111,107,.09);margin:0 -8px;padding:9px 8px;border-radius:8px;border-bottom:0}

  /* per-size-band comparison cards */
  .bandtitle{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;
    letter-spacing:.05em;margin:16px 0 10px}
  .bandcard{border:1px solid var(--line);border-radius:14px;padding:13px 14px;background:#fff;margin-bottom:11px}
  .bandhead{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:9px}
  .bandhead .bp{font-size:15px;font-weight:600}
  .bandhead .bp small{font-size:11px;color:var(--muted);font-weight:400;font-family:var(--mono)}
  .bandhead .bprice{font-family:"Fraunces",serif;font-size:21px;font-weight:500;font-variant-numeric:tabular-nums}
  .bandfoot{display:flex;align-items:center;justify-content:space-between;margin-top:8px;gap:10px}
  .ringmini{position:relative;width:40px;height:40px;flex:none;display:inline-flex;align-items:center;justify-content:center}
  .ringmini svg{transform:rotate(-90deg);position:absolute;inset:0}
  .ringmini b{font-family:"Fraunces",serif;font-size:13px;font-weight:500}
  .bandcard .sub{font-size:11.5px;color:var(--muted);margin-top:8px;line-height:1.5}
  .bandcard .peers{margin-top:10px}
  .bandcard .peers summary{padding:8px 0;font-size:12px}

  .empty{padding:40px 24px;text-align:center;color:var(--muted);font-size:13px;line-height:1.6}

  /* hint when nothing selected */
  .hint{position:absolute;left:50%;bottom:22px;transform:translateX(-50%);z-index:850;
    background:var(--ink);color:var(--paper);font-size:12.5px;padding:8px 16px;border-radius:999px;
    box-shadow:var(--shadow);opacity:.92;pointer-events:none;transition:opacity .3s}
  .hint.gone{opacity:0}

  @media (max-width:720px){
    .brand .sub{display:none}
    .controls{width:100%;justify-content:flex-start}
    .search input{flex:1;width:auto}
    .panel{width:100%;max-width:100%;height:64%;top:auto;bottom:0;border-left:0;border-top:1px solid var(--line);
      border-radius:18px 18px 0 0;transform:translateY(100%)}
    .panel.open{transform:translateY(0)}
    .panel::before{content:"";position:absolute;top:7px;left:50%;transform:translateX(-50%);
      width:38px;height:4px;border-radius:2px;background:var(--line-strong)}
    .legend{max-width:160px;font-size:11px}
  }
  @media (prefers-reduced-motion:reduce){
    *{transition:none!important;animation:none!important}
  }
</style>
</head>
<body>
<div class="app">
  <header class="bar">
    <div class="brand">
      <h1><span class="ko">창원</span> 아파트 <em>파인더</em></h1>
      <span class="sub">Changwon · 동일조건 가치 비교</span>
    </div>
    <div class="controls">
      <div class="seg" id="modeSeg" role="group" aria-label="거래 유형">
        <button data-mode="sale" class="on">매매</button>
        <button data-mode="jeonse">전세</button>
      </div>
      <select id="sizeSel" aria-label="평형">
        <option value="all">평형 전체</option>
        <option value="0-24">~24평</option>
        <option value="24-33">24~33평</option>
        <option value="33-43">33~43평</option>
        <option value="43-200">43평~</option>
      </select>
      <select id="guSel" aria-label="구">
        <option value="all">구 전체</option>
      </select>
      <label class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="q" type="search" placeholder="단지·동 검색" autocomplete="off">
      </label>
      <span class="demo-pill"><span class="dot"></span>데모 데이터</span>
    </div>
  </header>

  <div class="stage">
    <div id="map"></div>

    <div class="countpill"><span id="cnt">0</span>개 단지</div>

    <div class="legend">
      <b>가성비 (가치점수)</b>
      <div class="scale"></div>
      <div class="ends"><span>비쌈 0</span><span>좋음 10</span></div>
      <div class="row"><span class="star">★</span> 동일조건 대비 추천 단지</div>
      <div class="row">원 크기 = 평형</div>
    </div>

    <div class="hint" id="hint">지도의 단지를 눌러 상세·비교를 확인하세요</div>

    <aside class="panel" id="panel" aria-hidden="true"></aside>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
/* =====================================================================
   창원 아파트 파인더 — fully client-side, no backend, no API key.
   Dataset is SYNTHETIC but uses real Changwon 구/동 names and plausible
   prices/sizes/years. Comparison is deterministic math (no LLM).
   ===================================================================== */

/* ---- District clusters (approx real coords) + adjacency ---- */
const GU = {
  "성산구":   {c:[35.2210,128.6810], adj:["의창구"]},
  "의창구":   {c:[35.2540,128.6420], adj:["성산구","마산회원구"]},
  "마산회원구":{c:[35.2230,128.5790], adj:["마산합포구","의창구"]},
  "마산합포구":{c:[35.1860,128.5640], adj:["마산회원구"]},
  "진해구":   {c:[35.1340,128.7050], adj:["성산구"]},
};

/* ---- Tiny synthetic fallback (offline / data.json fetch failure only).
        Real data lives in data.json — 829 complexes from MOLIT 실거래가.
        Each complex: {name,gu,dong,built,lat,lng,dealCount,sizes:[{pyeong,area_m2,sale,jeonse,n}]} ---- */
const FALLBACK = { meta:{ period:"표본", fallback:true }, complexes:[
  {name:"트리비앙",gu:"성산구",dong:"반림동",built:2006,lat:35.2344,lng:128.6729,dealCount:417,
   sizes:[{pyeong:18,area_m2:60,sale:5.6,jeonse:3.8,n:82},{pyeong:26,area_m2:85,sale:6.9,jeonse:4.7,n:183},{pyeong:39,area_m2:130,sale:8.9,jeonse:6.5,n:21}]},
  {name:"창원센텀푸르지오",gu:"성산구",dong:"가음동",built:2018,lat:35.2097,lng:128.6896,dealCount:121,
   sizes:[{pyeong:18,area_m2:60,sale:6.61,jeonse:4.2,n:37},{pyeong:26,area_m2:85,sale:8.08,jeonse:5.4,n:40}]},
  {name:"중동유니시티",gu:"의창구",dong:"중동",built:2019,lat:35.2558,lng:128.6259,dealCount:96,
   sizes:[{pyeong:26,area_m2:85,sale:8.4,jeonse:5.2,n:30},{pyeong:34,area_m2:113,sale:9.4,jeonse:6.0,n:18}]},
  {name:"양덕메트로시티",gu:"마산회원구",dong:"양덕동",built:2014,lat:35.2200,lng:128.5977,dealCount:74,
   sizes:[{pyeong:25,area_m2:84,sale:5.4,jeonse:3.6,n:20},{pyeong:33,area_m2:110,sale:6.2,jeonse:4.2,n:14}]},
  {name:"자은중흥S클래스",gu:"진해구",dong:"자은동",built:2018,lat:35.1480,lng:128.6890,dealCount:60,
   sizes:[{pyeong:26,area_m2:84,sale:4.6,jeonse:3.2,n:18},{pyeong:34,area_m2:113,sale:5.4,jeonse:3.8,n:10}]},
  {name:"월영마린애시앙",gu:"마산합포구",dong:"월영동",built:2019,lat:35.1845,lng:128.5638,dealCount:55,
   sizes:[{pyeong:26,area_m2:84,sale:4.2,jeonse:3.0,n:16},{pyeong:34,area_m2:113,sale:5.0,jeonse:3.5,n:9}]},
]};

/* HOMES = one entry per complex. Each carries its size-bands. Value scores are
   computed per (complex,size) against same-size peers in the same/adjacent 구. */
let HOMES = [];
let DATA_META = {};
let mode = "sale"; // 'sale' | 'jeonse'

let SEQ = 0;
function ingest(data){
  DATA_META = data.meta || {};
  HOMES = (data.complexes||[]).map(c => ({
    id:"h"+(SEQ++),
    name:c.name, gu:c.gu, dong:c.dong, built:c.built,
    lat:c.lat, lng:c.lng, dealCount:c.dealCount||0,
    sizes:c.sizes||[],
  }));
}

/* price of a size-band in the current mode */
const bandPrice = b => mode==="sale" ? b.sale : b.jeonse;
const bandPPP   = b => { const p=bandPrice(b); return p? p*10000/b.pyeong : null; };
/* a complex "has" the current mode if any band is priced in it */
function pricedSizes(h){ return h.sizes.filter(b => bandPrice(b)!=null); }

/* peers for ONE size-band of a complex. Locality matters enormously: 평단가
   varies 2-3× between 동, so a fair "good deal?" comparison must be against
   nearby units of similar size — NOT the whole 구 (which just measures whether
   the 동 is pricey). Strategy, widening only if a tier is too thin:
     1. same 동, similar 평 (±4)
     2. + adjacent dong by geographic distance (≤2.5km), similar 평
     3. same 구, similar 평 (±5) as a last resort
   All filtered to bands priced in the current mode. Returns [{h,b}]. */
function distKm(a,b){
  const dy=(a.lat-b.lat)*111, dx=(a.lng-b.lng)*89; // ~Changwon lat
  return Math.sqrt(dy*dy+dx*dx);
}
function collect(h,b,pred,span){
  const out=[];
  for(const o of HOMES){
    if(o.id===h.id || !pred(o)) continue;
    for(const ob of o.sizes){
      if(bandPrice(ob)==null) continue;
      if(Math.abs(ob.pyeong-b.pyeong)<=span) out.push({h:o,b:ob});
    }
  }
  return out;
}
function ageOk(o,h){ return o.built==null||h.built==null||Math.abs(o.built-h.built)<=12; }
function bandPeers(h, b){
  // tier 1: same 동, similar 평, similar age — the fairest comparison
  let out = collect(h,b,o=>o.dong===h.dong && ageOk(o,h), 4);
  // tier 2: nearby (≤2.5km), similar 평+age
  if(out.length<4) out = collect(h,b,o=>distKm(o,h)<=2.5 && ageOk(o,h), 4);
  // tier 3: same 동 any age (drop age before dropping locality — locality matters more)
  if(out.length<4) out = collect(h,b,o=>o.dong===h.dong, 5);
  // tier 4: same 구, last resort
  if(out.length<4) out = collect(h,b,o=>o.gu===h.gu, 5);
  return out;
}

/* value score for one size-band (0.5..9.8): cheaper-than-peers + newer = higher */
function bandScore(h, b, peers){
  const ppp = bandPPP(b);
  if(!peers.length || ppp==null) return 5;
  const avg = peers.reduce((s,p)=>s+bandPPP(p.b),0)/peers.length;
  const priceDelta = (avg - ppp)/avg;                  // +ve = cheaper than local peers
  const recency = h.built!=null ? (h.built-2005)/20*0.8 : 0;
  // *9 fits the realistic ±30% local 평단가 spread without flooring/ceiling-ing.
  return Math.max(0.5, Math.min(9.8, 5 + priceDelta*9 + recency));
}

/* attach derived per-band + per-complex fields for current mode.
   A complex's headline score = its BEST band score (the standout deal). */
function recompute(){
  for(const h of HOMES){
    h._bands = [];
    for(const b of h.sizes){
      if(bandPrice(b)==null) continue;
      const peers = bandPeers(h,b);
      const avgPrice = peers.length ? peers.reduce((s,p)=>s+bandPrice(p.b),0)/peers.length : bandPrice(b);
      const avgPPP   = peers.length ? peers.reduce((s,p)=>s+bandPPP(p.b),0)/peers.length : bandPPP(b);
      h._bands.push({ b, peers, avgPrice, avgPPP, ppp:bandPPP(b), score:bandScore(h,b,peers) });
    }
    h._score = h._bands.length ? Math.max(...h._bands.map(x=>x.score)) : null;
    h._minPyeong = h._bands.length ? Math.min(...h._bands.map(x=>x.b.pyeong)) : null;
    h._maxPyeong = h._bands.length ? Math.max(...h._bands.map(x=>x.b.pyeong)) : null;
  }
  const scored = HOMES.filter(h=>h._score!=null);
  const scores = scored.map(h=>h._score).sort((a,b)=>b-a);
  const cut = scores[Math.floor(scores.length*0.20)] ?? 8;
  for(const h of HOMES){
    const best = h._bands.length ? h._bands.reduce((a,x)=>x.score>a.score?x:a) : null;
    h._rec = h._score!=null && h._score>=cut && best && best.ppp<=best.avgPPP*1.02;
  }
}

/* score -> colour on red→amber→green ramp */
function scoreColor(s){
  const t = Math.max(0,Math.min(1,s/10));
  const stops = [[192,73,47],[217,164,65],[63,143,91]]; // bad, mid, good
  let a,b,f;
  if(t<.5){a=stops[0];b=stops[1];f=t/.5;} else {a=stops[1];b=stops[2];f=(t-.5)/.5;}
  const mix=i=>Math.round(a[i]+(b[i]-a[i])*f);
  return `rgb(${mix(0)},${mix(1)},${mix(2)})`;
}

/* ---- map ---- */
const map = L.map("map",{zoomControl:true,attributionControl:true}).setView([35.215,128.62],11.5);
L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",{
  maxZoom:19, subdomains:"abcd",
  attribution:'&copy; <a href="https://openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a> · 실거래가: 국토교통부',
}).addTo(map);

let markers = new Map(); // id -> L.marker
let selected = null;

function markerIcon(h, sel){
  const pv = h._maxPyeong || 26;
  const r = 8 + (pv-20)/4;                  // largest size ↦ radius
  const d = Math.max(15, Math.min(32, r*2));
  const cls = "mk"+(h._rec?" rec":"")+(sel?" sel":"");
  const txt = (h._score!=null && h._score>=9) ? "★" : "";
  return L.divIcon({
    className:"", iconSize:[d,d], iconAnchor:[d/2,d/2],
    html:`<div class="${cls}" style="width:${d}px;height:${d}px;background:${scoreColor(h._score!=null?h._score:5)}">${txt}</div>`,
  });
}

/* representative (best-scoring) band of a complex in current mode */
function bestBand(h){ return h._bands.length ? h._bands.reduce((a,x)=>x.score>a.score?x:a) : null; }

function visibleHomes(){
  const sz = sizeSel.value, gu = guSel.value, q = qInput.value.trim().toLowerCase();
  const [lo,hi] = sz!=="all" ? sz.split("-").map(Number) : [null,null];
  return HOMES.filter(h=>{
    if(!h._bands.length) return false;                 // not priced in this mode
    if(gu!=="all" && h.gu!==gu) return false;
    if(sz!=="all" && !h._bands.some(x=>x.b.pyeong>=lo && x.b.pyeong<hi)) return false;
    if(q && !(`${h.name}${h.gu}${h.dong}`.toLowerCase().includes(q))) return false;
    return true;
  });
}

function renderMarkers(){
  for(const m of markers.values()) m.remove();
  markers.clear();
  const vis = visibleHomes();
  for(const h of vis){
    const m = L.marker([h.lat,h.lng],{icon:markerIcon(h, h.id===selected)})
      .addTo(map)
      .on("click",()=>openPanel(h.id));
    const bb = bestBand(h);
    const range = h._minPyeong===h._maxPyeong ? `${h._maxPyeong}평` : `${h._minPyeong}~${h._maxPyeong}평`;
    m.bindTooltip(`${h.name}<br>${range} · ${bb?fmtPrice(bandPrice(bb.b)):"-"}~`,{direction:"top",offset:[0,-10],opacity:.95});
    markers.set(h.id, m);
  }
  cnt.textContent = vis.length;
  if(selected && !vis.find(h=>h.id===selected)) closePanel();
}

/* ---- formatting ---- */
function fmtPrice(eok){
  // eok in 억 → "8.9억" or "8억 5,000" style kept simple: "8.9억"
  return (Math.round(eok*10)/10).toFixed(1).replace(/\.0$/,"") + "억";
}
function fmtPPP(v){ return Math.round(v).toLocaleString("ko-KR")+"만/평"; }
function pct(n){ return (n>=0?"+":"")+Math.round(n)+"%"; }
const modeLabel = ()=> mode==="sale" ? "매매가" : "전세가";

/* ---- detail panel ---- */
const panel = document.getElementById("panel");

/* render the comparison block for a single size-band */
function bandBlock(h, x){
  const price = bandPrice(x.b), avg = x.avgPrice;
  const deltaPct = (price-avg)/avg*100;
  const pppDeltaPct = (x.ppp - x.avgPPP)/x.avgPPP*100;
  const fillW = Math.max(6, Math.min(96, (price/(avg*1.8))*100));
  const avgPos = Math.max(6, Math.min(96, (avg/(avg*1.8))*100));
  const dirCls = deltaPct>2.5?"up":deltaPct<-2.5?"down":"flat";
  const dirWord = deltaPct>2.5?`평균보다 ${pct(deltaPct)} 비쌈`
                : deltaPct<-2.5?`평균보다 ${pct(deltaPct)} 저렴`
                : "평균과 거의 동일";
  // value rank among peers+self for this band
  const pool=[...x.peers.map(p=>({score:bandScore(p.h,p.b,[])})), {score:x.score}]; // light
  const ringLen=2*Math.PI*22, ringOff=ringLen*(1-x.score/10);
  return `
    <div class="bandcard">
      <div class="bandhead">
        <span class="bp">${x.b.pyeong}평 <small>(${x.b.area_m2}㎡)</small></span>
        <span class="bprice" style="color:${scoreColor(x.score)}">${fmtPrice(price)}</span>
      </div>
      <div class="barwrap">
        <div class="bar">
          <div class="fill" style="width:${fillW}%;background:${scoreColor(x.score)}"></div>
          <div class="avgline" style="left:${avgPos}%"></div>
          <div class="avgflag" style="left:${avgPos}%">평균 ${fmtPrice(avg)}</div>
          <div class="val">${fmtPrice(price)}</div>
        </div>
      </div>
      <div class="bandfoot">
        <span class="delta ${dirCls}">${dirWord}</span>
        <span class="ringmini" title="가치점수 ${x.score.toFixed(1)}/10" style="--c:${scoreColor(x.score)}">
          <svg width="40" height="40" viewBox="0 0 48 48"><circle cx="24" cy="24" r="22" fill="none" stroke="var(--line)" stroke-width="4"/><circle cx="24" cy="24" r="22" fill="none" stroke="${scoreColor(x.score)}" stroke-width="4" stroke-linecap="round" stroke-dasharray="${ringLen}" stroke-dashoffset="${ringOff}"/></svg>
          <b>${x.score.toFixed(1)}</b>
        </span>
      </div>
      <div class="sub">평단가 ${fmtPPP(x.ppp)} · 동일조건 평균 ${fmtPPP(x.avgPPP)} (${pct(pppDeltaPct)}) · 비교 ${x.peers.length}개 단지 · 거래 ${x.b.n}건</div>
      <details class="peers">
        <summary><span class="chev">›</span> 동일조건 단지 비교 (저가순)</summary>
        ${[...x.peers].sort((a,b)=>bandPrice(a.b)-bandPrice(b.b)).slice(0,12).map(p=>`
          <div class="peer" data-id="${p.h.id}">
            <span class="nm">${esc(p.h.name)} <small>${p.b.pyeong}평·${p.h.built||"-"}</small></span>
            <span class="pr">${fmtPrice(bandPrice(p.b))}</span>
          </div>`).join("") || '<div class="empty">비교 단지 부족</div>'}
      </details>
    </div>`;
}

function openPanel(id){
  const h = HOMES.find(x=>x.id===id); if(!h) return;
  const prev = selected; selected = id;
  if(prev && markers.has(prev)) markers.get(prev).setIcon(markerIcon(HOMES.find(x=>x.id===prev),false));
  if(markers.has(id)) markers.get(id).setIcon(markerIcon(h,true));

  if(!h._bands.length){
    panel.innerHTML = `<div class="ph"><button class="close">×</button><h2>${esc(h.name)}</h2>
      <div class="loc">${h.gu} ${h.dong}</div></div>
      <div class="pbody"><div class="empty">이 단지는 현재 모드(${modeLabel()})의 실거래 데이터가 없습니다.<br>매매/전세 토글을 바꿔보세요.</div></div>`;
    panel.classList.add("open"); panel.querySelector(".close").onclick=closePanel; return;
  }

  const best = h._bands.reduce((a,x)=>x.score>a.score?x:a);
  let verdict;
  if(h._score>=8.5) verdict="동일조건 최상위 가성비";
  else if(h._score>=7) verdict="평균보다 좋은 조건";
  else if(h._score>=5) verdict="평균 수준";
  else if(h._score>=3.5) verdict="다소 비싼 편";
  else verdict="가격 부담이 큼";
  const ringLen=2*Math.PI*28, ringOff=ringLen*(1-h._score/10);
  const age = h.built!=null ? `${2026-h.built}년차 <small>(${h.built})</small>` : "—";
  const bands = [...h._bands].sort((a,b)=>a.b.pyeong-b.b.pyeong);

  panel.innerHTML = `
    <div class="ph">
      <button class="close" aria-label="닫기">×</button>
      <h2>${esc(h.name)}</h2>
      <div class="loc">${h.gu} ${h.dong} · ${h._minPyeong===h._maxPyeong?h._maxPyeong+"평":h._minPyeong+"~"+h._maxPyeong+"평"} · ${h.built||"-"}년 준공</div>
    </div>
    <div class="pbody">
      <div class="score">
        <div class="ring">
          <svg width="64" height="64" viewBox="0 0 64 64">
            <circle cx="32" cy="32" r="28" fill="none" stroke="var(--line)" stroke-width="6"/>
            <circle cx="32" cy="32" r="28" fill="none" stroke="${scoreColor(h._score)}" stroke-width="6"
              stroke-linecap="round" stroke-dasharray="${ringLen}" stroke-dashoffset="${ringOff}"/>
          </svg>
          <span class="n">${h._score.toFixed(1)}</span>
        </div>
        <div class="txt">
          <div class="verdict">${verdict}</div>
          <div class="pct">대표 ${best.b.pyeong}평 기준 · ${modeLabel()}${h._rec?" · ★ 추천":""}</div>
        </div>
      </div>

      <div class="metrics">
        <div class="metric"><div class="k">연식</div><div class="v">${age}</div></div>
        <div class="metric"><div class="k">거래량 <small>(1년)</small></div><div class="v">${h.dealCount}<small> 건</small></div></div>
      </div>

      <h3 class="bandtitle">평형별 ${modeLabel()} · 동일조건 비교</h3>
      ${bands.map(x=>bandBlock(h,x)).join("")}
    </div>`;

  panel.classList.add("open"); panel.setAttribute("aria-hidden","false");
  hint.classList.add("gone");
  panel.querySelector(".close").onclick = closePanel;
  panel.querySelectorAll(".peer").forEach(el=>el.onclick=()=>{
    const p = HOMES.find(x=>x.id===el.dataset.id);
    if(p){ map.panTo([p.lat,p.lng]); openPanel(p.id); }
  });
  if(window.innerWidth>720) map.panTo([h.lat,h.lng]);
}

function closePanel(){
  panel.classList.remove("open"); panel.setAttribute("aria-hidden","true");
  const prev = selected; selected=null;
  if(prev && markers.has(prev)) markers.get(prev).setIcon(markerIcon(HOMES.find(x=>x.id===prev),false));
}
function esc(s){ const d=document.createElement("div"); d.textContent=s; return d.innerHTML; }

/* ---- controls ---- */
const sizeSel=document.getElementById("sizeSel");
const guSel=document.getElementById("guSel");
const qInput=document.getElementById("q");
const cnt=document.getElementById("cnt");
const hint=document.getElementById("hint");

Object.keys(GU).forEach(g=>{ const o=document.createElement("option"); o.value=g; o.textContent=g; guSel.appendChild(o); });

document.getElementById("modeSeg").addEventListener("click",e=>{
  const b=e.target.closest("button"); if(!b) return;
  document.querySelectorAll("#modeSeg button").forEach(x=>x.classList.toggle("on",x===b));
  mode=b.dataset.mode; recompute(); renderMarkers();
  if(selected) openPanel(selected);
});
sizeSel.onchange=renderMarkers;
guSel.onchange=()=>{ renderMarkers(); if(guSel.value!=="all") map.flyTo(GU[guSel.value].c,12.6,{duration:.6}); };
let qt; qInput.oninput=()=>{ clearTimeout(qt); qt=setTimeout(renderMarkers,120); };

map.on("click",()=>{ /* clicking empty map keeps selection; tap close to dismiss */ });

/* ---- boot: fetch real data.json, fall back to tiny synthetic sample ---- */
function boot(data){
  ingest(data);
  recompute();
  renderMarkers();
  // demo pill text reflects real vs fallback
  const pill = document.querySelector(".demo-pill");
  if(pill){
    if(DATA_META.fallback){ pill.innerHTML = '<span class="dot"></span>오프라인 표본'; }
    else { pill.innerHTML = '<span class="dot"></span>실거래가 · ' + (DATA_META.complexes||HOMES.length) + '개 단지'; }
  }
}
fetch("./data.json", {cache:"no-cache"})
  .then(r => { if(!r.ok) throw new Error(r.status); return r.json(); })
  .then(boot)
  .catch(err => { console.warn("data.json load failed, using fallback:", err); boot(FALLBACK); });
setTimeout(()=>hint.classList.add("gone"),6000);

/* ---- PWA ---- */
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}));
}
</script>
