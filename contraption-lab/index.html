<!doctype html>
<html lang="en" data-theme="blueprint">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#1b2a4a">
  <title>Contraption Lab</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icon.svg">
  <link rel="stylesheet" href="./style.css">
  <script src="./vendor/matter.min.js"></script>
  <script type="importmap">
    { "imports": { "pocketbase": "https://cdn.jsdelivr.net/npm/pocketbase@0.26.2/dist/pocketbase.es.mjs" } }
  </script>
</head>
<body>
  <header class="bar">
    <button id="menuBtn" class="ghostbtn">☰ Levels</button>
    <button class="ghostbtn" onclick="location.hash='#/editor'">✎ Editor</button>
    <button class="ghostbtn" onclick="location.hash='#/browse'">🌐 Browse</button>
    <span class="brand">Contraption&nbsp;Lab</span>
    <span class="status" id="levelTitle"></span>
    <button id="accountBtn" class="ghostbtn" type="button">Sign in</button>
    <span id="netDot" class="netdot" title="local only">○</span>
    <label class="themePick">Theme
      <select id="themeSel"></select>
    </label>
  </header>
  <div class="stagewrap"><canvas id="stage"></canvas>
    <div id="banner" class="banner" hidden></div>
  </div>
  <footer class="palette" id="palette"></footer>
  <div class="controls">
    <button id="runBtn" class="primary">▶ Run</button>
    <button id="resetBtn">↺ Reset</button>
    <button id="lbBtn" type="button">🏆 Leaderboard</button>
  </div>
  <dialog id="levelMenu"></dialog>
  <dialog id="accountDlg" class="account">
    <form method="dialog">
      <h3 id="accountTitle">Account</h3>
      <p class="hint">Sign in to sync your progress across devices and join the leaderboards. The game works fully without an account.</p>
      <input id="acEmail" type="email" placeholder="email" autocomplete="email">
      <input id="acPass" type="password" placeholder="password" autocomplete="current-password">
      <input id="acName" type="text" placeholder="display name (for the leaderboard)" autocomplete="nickname">
      <p id="acError" class="acerror" hidden></p>
      <menu>
        <button id="acLogin" value="default" type="button">Sign in</button>
        <button id="acSignup" value="default" type="button">Create account</button>
        <button id="acLogout" value="default" type="button" hidden>Sign out</button>
        <button value="cancel">Close</button>
      </menu>
    </form>
  </dialog>
  <dialog id="lbDlg" class="account"><div id="lbBody"><h3>Leaderboard</h3><p class="hint">Sign in and solve a level to appear here.</p></div><form method="dialog"><menu><button value="cancel">Close</button></menu></form></dialog>

  <!-- Editor screen (hidden by default, shown when routing to #/editor) -->
  <div id="editorScreen" hidden>
    <div id="editorBar" class="bar">
      <button data-tool="fixed" class="ghostbtn">Scenery</button>
      <button data-tool="start" class="ghostbtn">Objects</button>
      <button data-tool="goal" class="ghostbtn">Goal</button>
      <button data-tool="inventory" class="ghostbtn">Inventory</button>
      <button id="testBtn" class="ghostbtn">▶ Test</button>
      <button id="publishBtn" class="ghostbtn">Publish</button>
      <button id="clearBtn" class="ghostbtn">Clear</button>
      <label>Angle <input id="angleSlider" type="range" min="-3.14" max="3.14" step="0.1" value="0"></label>
    </div>
    <div class="stagewrap"><canvas id="editorCanvas"></canvas></div>
    <footer class="palette" id="editorPalette"></footer>
  </div>

  <dialog id="publishDlg" class="account">
    <form method="dialog">
      <h3>Publish Level</h3>
      <p class="hint">Share your level with the community.</p>
      <input id="publishTitle" type="text" placeholder="Level title" required>
      <menu>
        <button type="submit" value="default">Publish</button>
        <button type="button" value="cancel" onclick="this.closest('dialog').close()">Cancel</button>
      </menu>
    </form>
  </dialog>

  <!-- Browse screen (hidden by default, shown when routing to #/browse) -->
  <div id="browseScreen" hidden>
    <div class="bar">
      <span class="brand">Community Levels</span>
      <button data-tab="recent" class="ghostbtn browsetab active">Recent</button>
      <button data-tab="played" class="ghostbtn browsetab">Most Played</button>
      <button data-tab="rated" class="ghostbtn browsetab">Top Rated</button>
    </div>
    <div id="browseGrid" class="browsegrid"></div>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
